<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>控制台 · AI 真垃圾</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a0a0a;color:#f0f0ee;
  font-family:"Inter","Noto Sans SC","Microsoft YaHei UI",sans-serif;
  padding:2vh 4vw;min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1{font-weight:200;font-size:clamp(24px,5vw,40px);margin-bottom:2vh;letter-spacing:-.02em}
h1 span{color:#3366FF;font-weight:300}
h2{font-weight:400;font-size:clamp(14px,2.5vw,18px);opacity:.5;margin-bottom:3vh}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:3vh}
.btn{
  padding:12px 8px;border:1px solid rgba(255,255,255,.15);
  background:transparent;color:#f0f0ee;
  font-size:clamp(12px,1.8vw,15px);cursor:pointer;
  transition:all .2s;text-align:center;
  font-family:inherit;
}
.btn:hover{background:rgba(255,255,255,.06)}
.btn.active{background:#3366FF;border-color:#3366FF;color:#fff}
.ctl-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:2vh}
.ctl-btn{
  padding:10px 16px;border:1px solid rgba(255,255,255,.2);
  background:#1a1a1c;color:#f0f0ee;cursor:pointer;
  font-size:14px;transition:all .2s;
  font-family:inherit;
}
.ctl-btn:hover{background:rgba(255,255,255,.08)}
.ctl-btn.accent{background:#3366FF;border-color:#3366FF;color:#fff}
.ctl-btn.warn{background:rgba(255,170,0,.15);border-color:rgba(255,170,0,.3);color:#ffaa00}
.section{margin-bottom:3vh}
.section h3{font-weight:600;font-size:13px;letter-spacing:.1em;text-transform:uppercase;opacity:.4;margin-bottom:1.2vh}
.card-list{display:flex;flex-direction:column;gap:6px}
.card-btn{
  padding:8px 14px;border:1px solid rgba(255,255,255,.12);
  background:transparent;color:#f0f0ee;cursor:pointer;
  font-size:13px;text-align:left;transition:all .2s;
  font-family:inherit;
  display:flex;justify-content:space-between;align-items:center;
}
.card-btn:hover{background:rgba(255,255,255,.05)}
.card-btn .st{font-size:11px;opacity:.4}
.info{font-size:12px;opacity:.35;text-align:center;margin-top:3vh}
.nav-row{display:flex;gap:8px;align-items:center;margin-bottom:2vh}
.nav-btn{
  width:44px;height:44px;border:1px solid rgba(255,255,255,.2);
  background:#1a1a1c;color:#f0f0ee;cursor:pointer;
  font-size:20px;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.nav-btn:hover{background:#3366FF;border-color:#3366FF}
.current{font-size:clamp(16px,3vw,24px);font-weight:200;min-width:60px;text-align:center}
</style>
</head>
<body>
<h1>🎮 控制<span>台</span></h1>
<h2>AI 真垃圾 · 分享会 · 远程控制</h2>

<!-- 页码网格 -->
<div class="section">
  <h3>📄 页码跳转</h3>
  <div class="grid" id="pageGrid"></div>
</div>

<!-- 翻页 -->
<div class="section">
  <h3>⬅️➡️ 翻页</h3>
  <div class="nav-row">
    <button class="nav-btn" onclick="navPrev()">◀</button>
    <span class="current" id="currentSlide">1</span>
    <button class="nav-btn" onclick="navNext()">▶</button>
    <button class="nav-btn" onclick="navHome()" style="font-size:14px">⏮</button>
    <button class="nav-btn" onclick="navEnd()" style="font-size:14px">⏭</button>
  </div>
</div>

<!-- 卡片控制 -->
<div class="section">
  <h3>📇 卡片展开/折叠</h3>
  <div class="card-list" id="cardList"></div>
</div>

<!-- Tab 控制 -->
<div class="section">
  <h3>🔀 Tab 切换</h3>
  <div class="ctl-row" id="tabControls"></div>
</div>

<!-- 弹窗 -->
<div class="section">
  <h3>📋 弹窗演示</h3>
  <div class="ctl-row">
    <button class="ctl-btn accent" onclick="sendMsg({type:'modal',action:'open',id:'demo-hr'})">打开简历 Demo</button>
    <button class="ctl-btn" onclick="sendMsg({type:'modal',action:'close'})">关闭弹窗</button>
  </div>
</div>

<div class="info">BroadcastChannel · 与主页面同源 · 实时同步</div>

<script>
const CH = 'ai-ppt-4';
const TOTAL = 20;
const bc = new BroadcastChannel(CH);
let currentSlide = 1;

function sendMsg(msg){
  try { bc.postMessage(msg); } catch(e) { console.error(e); }
}

function goSlide(n){
  currentSlide = Math.max(1, Math.min(TOTAL, n));
  sendMsg({type:'go', slide:currentSlide});
  updateUI();
}

function navNext(){ goSlide(currentSlide + 1); }
function navPrev(){ goSlide(currentSlide - 1); }
function navHome(){ goSlide(1); }
function navEnd(){ goSlide(TOTAL); }

function updateUI(){
  document.getElementById('currentSlide').textContent = currentSlide + ' / ' + TOTAL;
  document.querySelectorAll('#pageGrid .btn').forEach((b,i)=>{
    b.classList.toggle('active', i+1 === currentSlide);
  });
}

// Listen for main page updates
bc.onmessage = function(e){
  const msg = e.data;
  if(msg && msg.type === 'nav' && typeof msg.slide === 'number'){
    currentSlide = msg.slide;
    updateUI();
  }
};

// Build page grid
const grid = document.getElementById('pageGrid');
for(let i=1;i<=TOTAL;i++){
  const btn = document.createElement('button');
  btn.className = 'btn';
  btn.textContent = i;
  btn.onclick = ()=>goSlide(i);
  grid.appendChild(btn);
}

// Build card list
const cards = [
  {id:'card-answer', label:'Slide 2 · 答案卡片', slide:2},
  {id:'card-pretrain', label:'Slide 4 · 预训练', slide:4},
  {id:'card-finetune', label:'Slide 4 · 指令微调', slide:4},
  {id:'card-rlhf', label:'Slide 4 · RLHF', slide:4},
  {id:'card-limits', label:'Slide 4 · 模型局限', slide:4},
  {id:'card-loop-1', label:'Slide 16 · 循环流程', slide:16},
  {id:'card-loop-2', label:'Slide 16 · AI没有眼睛', slide:16},
  {id:'card-loop-3', label:'Slide 16 · 多Agent并行', slide:16},
];
const cardList = document.getElementById('cardList');
cards.forEach(c=>{
  const btn = document.createElement('button');
  btn.className = 'card-btn';
  btn.innerHTML = c.label + '<span class="st">翻到第'+c.slide+'页后点击</span>';
  btn.onclick = ()=>{
    goSlide(c.slide);
    setTimeout(()=>sendMsg({type:'card', id:c.id, open:true}), 1200);
  };
  cardList.appendChild(btn);
});

// Build tab controls
const tabGroups = [
  {group:'ctx', label:'Slide 8 · 上下文三级别', btns:['普通提问','提示词工程','上下文工程']},
];
const tabControls = document.getElementById('tabControls');
tabGroups.forEach(g=>{
  g.btns.forEach((label,idx)=>{
    const btn = document.createElement('button');
    btn.className = 'ctl-btn';
    btn.textContent = label;
    btn.onclick = ()=>{
      goSlide(8);
      setTimeout(()=>sendMsg({type:'tab', group:g.group, idx:idx}), 1200);
    };
    tabControls.appendChild(btn);
  });
});

updateUI();
console.log('[Control] Ready on channel:', CH);
</script>
</body>
</html>

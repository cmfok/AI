<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>语音监听 · AI 真垃圾</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a0a0a;color:#f0f0ee;
  font-family:"Inter","Noto Sans SC","Microsoft YaHei UI",sans-serif;
  padding:2vh 4vw;min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1{font-weight:200;font-size:clamp(24px,5vw,40px);margin-bottom:1vh;letter-spacing:-.02em}
h1 span{color:#33cc66;font-weight:300}
.status{font-size:14px;opacity:.5;margin-bottom:3vh}
.btn-big{
  padding:16px 32px;border:2px solid #33cc66;background:rgba(51,204,102,.08);
  color:#33cc66;font-size:18px;cursor:pointer;font-family:inherit;
  transition:all .3s;margin-bottom:2vh;font-weight:600;
}
.btn-big:hover{background:rgba(51,204,102,.15)}
.btn-big.listening{background:#33cc66;color:#0a0a0a;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.transcript{
  background:#1a1a1c;border:1px solid rgba(255,255,255,.1);
  padding:2vh 3vw;min-height:20vh;margin-bottom:2vh;
  font-size:clamp(14px,2vw,18px);line-height:1.6;
  color:rgba(255,255,255,.8);
}
.transcript .interim{opacity:.4;font-style:italic}
.log{font-size:12px;opacity:.3;line-height:1.8}
.info{font-size:11px;opacity:.25;text-align:center;margin-top:2vh}
</style>
</head>
<body>
<h1>🎤 语音<span>监听</span></h1>
<p class="status" id="statusText">点击下方按钮开始语音识别</p>

<button class="btn-big" id="listenBtn" onclick="toggleListen()">▶ 开始监听</button>

<div class="transcript" id="transcript">
  <p style="opacity:.3">语音识别结果将显示在这里...</p>
</div>

<div class="log" id="log"></div>
<div class="info">Web Speech API · BroadcastChannel · 实时同步到主页面</div>

<script>
const CH = 'ai-ppt-4';
const bc = new BroadcastChannel(CH);
let listening = false;
let recognition = null;

function log(msg){
  const el = document.getElementById('log');
  el.innerHTML += '<div>'+new Date().toLocaleTimeString()+' · '+msg+'</div>';
}

function toggleListen(){
  if(listening){ stopListen(); return; }
  startListen();
}

function startListen(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    alert('您的浏览器不支持语音识别。请使用 Chrome。');
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.interimResults = true;
  recognition.continuous = true;

  recognition.onresult = function(e){
    let final = '', interim = '';
    for(let i=0;i<e.results.length;i++){
      const r = e.results[i];
      if(r.isFinal) final += r[0].transcript;
      else interim += r[0].transcript;
    }
    const el = document.getElementById('transcript');
    if(final){
      el.innerHTML = '<p>'+final+'</p>';
      log('📝 '+final);
      // Send to QA/broadcast
      bc.postMessage({type:'voice', text:final, time:Date.now()});
    }
    if(interim) el.innerHTML += '<p class="interim">'+interim+'</p>';
  };

  recognition.onerror = function(e){
    log('⚠️ 错误: '+e.error);
    if(e.error==='no-speech'){ /* ignore */ }
    else if(e.error==='aborted'){ /* user stopped */ }
    else { stopListen(); }
  };

  recognition.onend = function(){
    if(listening){
      try { recognition.start(); } catch(e) { /* restart failed */ }
    }
  };

  recognition.start();
  listening = true;
  document.getElementById('listenBtn').textContent = '⏸ 停止监听';
  document.getElementById('listenBtn').classList.add('listening');
  document.getElementById('statusText').textContent = '🔴 正在监听中...';
  log('🎤 开始监听');
}

function stopListen(){
  listening = false;
  if(recognition){
    try { recognition.stop(); } catch(e) {}
    recognition = null;
  }
  document.getElementById('listenBtn').textContent = '▶ 开始监听';
  document.getElementById('listenBtn').classList.remove('listening');
  document.getElementById('statusText').textContent = '⏸ 已停止';
  log('⏸ 停止监听');
}

console.log('[Listen] Ready on channel:', CH);
</script>
</body>
</html>

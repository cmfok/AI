<style>
/* ===== 品牌卡片组件样式 ===== */
.brand-cards-wrap{display:flex;flex-direction:row;gap:12px;align-items:center;justify-content:center}
.brand-box{border:1px solid var(--border,#e0e0e0);border-radius:var(--radius,12px);padding:6px;display:flex;gap:2px;background:var(--bg-soft,#f7f7f8)}
.brand-box-company{width:190px;display:flex;flex-direction:column;gap:8px}
.brand-box-model{width:130px;display:flex;flex-direction:column;gap:8px;align-items:center}
.brand-box-model .brand-card{justify-content:center}
.brand-card{display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0;border-radius:8px;font-size:13px;font-weight:500}
.brand-card-cn{background:rgba(59,108,255,.06);width:100%;box-sizing:border-box}
.brand-card-foreign{background:rgba(229,62,62,.06);width:100%;box-sizing:border-box}
.brand-card img{flex-shrink:0;border-radius:4px}
</style>

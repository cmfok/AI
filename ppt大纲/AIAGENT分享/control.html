<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>控制台 · 从会用AI，到用好AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f5f5;color:#222;font-family:'Inter','Noto Sans SC',sans-serif;padding:0;overflow-x:hidden}
.sticky{position:sticky;top:0;z-index:100;touch-action:pan-y;background:#f5f5f5;padding:12px 12px 0}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:12px;margin-bottom:8px}
.top-bar .left{display:flex;align-items:center;gap:8px}
.top-bar .info{font-size:14px;color:#777}
.top-bar .info strong{color:#111;font-size:20px}
.top-bar .right{display:flex;align-items:center;gap:6px;font-size:13px;color:#777}
.top-bar .right .dot{width:8px;height:8px;border-radius:50%;background:#238636;display:inline-block}
	.page-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px}
.page-dot{padding:8px 0;border-radius:8px;border:1px solid rgba(0,0,0,.08);background:rgba(0,0,0,.02);font-size:13px;color:#777;text-align:center;cursor:pointer}
.page-dot.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
.actions{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;min-height:36px}
.actions .btn{min-width:120px;text-align:center;flex-shrink:0}
.actions .act-btn{min-width:auto;font-size:12px;padding:6px 8px;flex:1;text-align:center}

/* ── 通用按钮（修复：原来只有 .actions .btn，lockBtn 不在 .actions 内所以无样式）── */
.btn{padding:8px 16px;border-radius:8px;border:1px solid rgba(0,0,0,.1);background:rgba(0,0,0,.04);color:#222;font-size:13px;cursor:pointer;font-family:inherit}
.btn:active{background:rgba(0,0,0,.06)}
.btn.on{border-color:#7ee787;background:rgba(126,231,135,.1);color:#7ee787}
.btn.danger{border-color:rgba(229,62,62,.3);color:#e53e3e}
.btn.danger:active{background:rgba(229,62,62,.08)}
.btn.small{font-size:11px;padding:4px 10px}
.btn.locked{background:rgba(247,118,142,.15);border-color:#f7768e;color:#e53e3e}
.btn.unlocked{background:rgba(126,231,135,.15);border-color:#7ee787;color:#238636}

.scroll{overflow-y:auto;touch-action:pan-y;padding:0 12px 90px;max-height:calc(100vh - 180px)}
.speaker-panel{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:16px;margin-bottom:8px}
.speaker-panel .sl{font-size:11px;color:#777;font-family:'JetBrains Mono',monospace;margin-bottom:8px;letter-spacing:.5px}
.speaker-panel .sc{font-size:16px;line-height:1.8;color:#333;white-space:pre-wrap}
.speaker-panel .sc strong{color:#111}
.next-prev{background:rgba(0,0,0,.02);border:1px solid rgba(0,0,0,.05);border-radius:10px;padding:12px;margin-bottom:8px;opacity:.7}
.next-prev .nl{font-size:10px;color:#777;font-family:'JetBrains Mono',monospace;margin-bottom:4px}
.next-prev .nc{font-size:12px;line-height:1.5;color:#777;white-space:pre-wrap}
.bottom-nav{position:fixed;bottom:16px;left:12px;right:12px;display:flex;gap:8px;z-index:200;max-width:600px;margin:0 auto}
.bottom-nav .bn{flex:1;padding:14px 0;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;text-align:center}
.bottom-nav .bp{background:#ddd;color:#222;border:1px solid rgba(0,0,0,.12)}
.bottom-nav .bnx{background:#238636;color:#fff}
.bottom-nav .bn:active{transform:scale(.97)}

/* ── Tab 切换 ── */
.tab-bar{display:flex;gap:4px;margin-bottom:8px}
.tab-btn{flex:1;padding:7px 0;border-radius:8px;border:1px solid rgba(0,0,0,.08);background:rgba(0,0,0,.02);color:#777;font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit}
.tab-btn.active{background:rgba(0,113,227,.12);border-color:rgba(0,113,227,.3);color:#1f6feb}
.tab-btn:active{transform:scale(.97)}
.tab-content{display:none}
.tab-content.active{display:block}

/* ── 问题卡片按钮行 ── */
.q-actions{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}

/* ── 移动页面选择器 ── */
.move-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.move-card{background:#fff;border:1px solid rgba(0,0,0,.12);border-radius:12px;padding:20px;width:100%;max-width:380px}
.move-card h4{font-size:15px;margin-bottom:8px;color:#111}
.move-card .sub{font-size:12px;color:#777;margin-bottom:14px}
.move-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px}
.move-dot{padding:10px 0;border-radius:8px;border:1px solid rgba(0,0,0,.1);background:rgba(0,0,0,.03);color:#777;font-size:13px;text-align:center;cursor:pointer}
.move-dot:active{background:rgba(31,111,235,.15);border-color:#1f6feb;color:#1f6feb}
.move-dot.cur{background:#1f6feb;border-color:#1f6feb;color:#fff}
.move-actions{display:flex;gap:8px;margin-top:12px}
.move-actions .btn{flex:1;text-align:center}

/* ── 当前页提问提示 ── */
.q-hint{display:none;padding:10px 14px;margin-bottom:8px;background:rgba(0,113,227,.08);border:1px solid rgba(0,113,227,.2);border-radius:10px;font-size:13px;color:#1f6feb;cursor:pointer;text-align:center}
.q-hint:active{background:rgba(0,113,227,.15)}
.q-hint .badge{display:inline-block;background:#1f6feb;color:#fff;font-size:11px;padding:1px 8px;border-radius:10px;margin:0 4px;font-weight:600}

/* ── 多设备适配 ── */
@media(max-width:768px){
  .tab-bar{gap:3px}
  .tab-btn{font-size:11px!important;padding:6px 2px}
  .scroll{padding:0 8px 80px;max-height:calc(100vh - 160px)}
  .actions .btn{min-width:90px;font-size:11px;padding:6px 10px}
	  .page-grid{grid-template-columns:repeat(7,1fr);gap:3px}
  .page-dot{padding:6px 0;font-size:11px}
  .move-grid{grid-template-columns:repeat(5,1fr);gap:4px}
  .move-dot{padding:8px 0;font-size:11px}
  .speaker-panel{padding:12px}
  .speaker-panel .sc{font-size:14px}
  .bottom-nav .bn{font-size:13px;padding:12px 0}
  .top-bar{padding:8px 10px;flex-wrap:wrap;gap:4px}
  .top-bar .info{font-size:12px}
  #lockRow{gap:3px}
  #lockRow .tab-btn{font-size:11px!important;padding:5px 4px}
}
@media(max-width:480px){
  .tab-bar{flex-wrap:wrap}
  .tab-btn{flex:1 1 auto;min-width:45px;font-size:10px!important;padding:5px 2px}
	  .page-grid{grid-template-columns:repeat(7,1fr);gap:2px}
  .page-dot{padding:5px 0;font-size:10px}
  .actions .btn{min-width:70px;font-size:10px;padding:5px 8px}
  .scroll{padding:0 6px 70px;max-height:calc(100vh - 150px)}
  .bottom-nav{left:6px;right:6px;gap:4px}
  .bottom-nav .bn{font-size:12px;padding:10px 0}
  .move-card{padding:14px;max-width:300px}
  .move-grid{grid-template-columns:repeat(5,1fr);gap:3px}
  .move-dot{padding:6px 0;font-size:10px}
  .speaker-panel .sc{font-size:13px}
  .next-prev{padding:8px}
  .next-prev .nc{font-size:11px}
  .top-bar{gap:2px}
  .top-bar .center{gap:2px}
}
</style>
</head>
<body>
<div class="sticky">
  <div class="top-bar">
    <div class="left"><div class="info">🎙 <strong id="cp">1</strong> / <span id="tp">21</span></div></div>
    <div class="center" style="display:flex;gap:4px;align-items:center">
      <button class="btn" id="lockBtn" style="font-size:11px;padding:5px 8px;white-space:nowrap">🔓 解锁</button>
      <button class="btn" onclick="showOverview()" style="font-size:11px;padding:5px 8px;white-space:nowrap">📋 总览</button>
      <button class="btn" onclick="cycleTheme()" style="font-size:11px;padding:5px 8px;white-space:nowrap">🎨 换肤</button>
      <button class="btn" onclick="goToQA()" style="font-size:11px;padding:5px 8px;white-space:nowrap">💬 问答·P22</button>
    </div>
    <div class="right"><span class="dot"></span>已连接</div>
  </div>
  <div class="page-grid" id="pg"></div>
  <div id="lockRow" style="display:flex;gap:4px;margin-bottom:6px;align-items:stretch;flex-wrap:wrap">
    <button class="tab-btn active" data-tab="script" style="font-size:12px">📝 讲稿</button>
    <button class="tab-btn" data-tab="questions" style="font-size:12px">💬 提问</button>
    <button class="tab-btn" data-tab="poll" style="font-size:12px">📊 投票</button>
    <button class="tab-btn" data-tab="model" style="font-size:12px">🧪 模型</button>
  </div>
</div>
<div class="scroll">
  <div class="tab-content active" id="tabScript">
    <div class="actions" id="actBox" style="display:none;margin-bottom:8px"></div>
    <div class="speaker-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="sl" id="sl" style="margin-bottom:0">P1 · 封面</div>
        <div style="display:flex;gap:4px" id="editBtns">
          <button class="btn small" onclick="startEditSpeech()">✏️ 编辑</button>
          <button class="btn small" id="syncSpeechBtn" onclick="syncSpeechFromServer()" style="font-size:10px">⬇ 同步服务端</button>
        </div>
        <div style="display:none;gap:4px" id="saveBtns">
          <button class="btn small on" onclick="saveSpeech()">💾 保存</button>
          <button class="btn small" onclick="cancelEditSpeech()">取消</button>
        </div>
      </div>
      <div class="sc" id="sc">加载中...</div>
      <textarea id="scEdit" style="display:none;width:100%;min-height:200px;background:#fff;color:#222;border:1px solid #ddd;border-radius:8px;padding:12px;font-size:15px;line-height:1.8;font-family:inherit;resize:vertical"></textarea>
    </div>
    <div class="q-hint" id="qHint" onclick="switchToQuestions()"></div>
    <div class="next-prev">
      <div class="nl">⏭ 下一页</div>
      <div class="nc" id="nc">—</div>
    </div>
  </div>

  <div class="tab-content" id="tabQuestions">
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:10px">
      <span style="font-size:13px;color:#777;font-weight:600">💬 观众问题</span>
      <span style="font-size:10px;color:#999;padding:2px 8px;background:rgba(0,0,0,.05);border-radius:8px" id="qCount">0</span>
      <button class="btn small" id="filterBtn" onclick="toggleFilter()" style="margin-left:auto;font-size:11px">📄 当前页</button>
      <button class="btn small" onclick="resetDeleted()" style="font-size:11px" title="恢复所有已删除问题">🔄 重置</button>
    </div>
    <div id="qlist" style="min-height:0"></div>
  </div>

  <div class="tab-content" id="tabPoll">
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:10px">
      <span style="font-size:13px;color:#777;font-weight:600">📊 现场投票</span>
      <button class="btn small" id="pollOverlayBtn" onclick="togglePollOverlay()" style="font-size:11px">📺 投屏显示</button>
      <button class="btn small" onclick="loadPollResults()" style="margin-left:auto;font-size:11px">🔄 刷新</button>
    </div>
    <div id="pollResults" style="min-height:0">
      <div style="text-align:center;padding:30px;color:#999;font-size:13px">加载中...</div>
    </div>
  </div>

  <div class="tab-content" id="tabModel">
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
      <span style="font-size:13px;color:#777;font-weight:600">🧪 模型测试</span>
      <span style="font-size:10px;color:#999;padding:2px 8px;background:rgba(0,0,0,.05);border-radius:8px">直调 DeepSeek API</span>
      <button class="btn small" id="modelClearBtn" onclick="clearModelChat()" style="font-size:11px">🗑 清空</button>
      <button class="btn small" id="modelPopupBtn" onclick="toggleModelPopup()" style="margin-left:4px;font-size:11px">📺 投屏显示</button>
    </div>
    <div id="modelApiKeyRow" style="display:flex;gap:4px;align-items:center;margin-bottom:8px">
      <span style="font-size:11px;color:#999;white-space:nowrap">🔑 API Key</span>
      <span style="flex:1;font-size:12px;color:#777;padding:5px 8px;border-radius:6px;background:rgba(0,0,0,.03);border:1px solid rgba(0,0,0,.08)">已配置在服务器</span>
    </div>
    <div style="font-size:10px;color:#aaa;margin-bottom:8px;line-height:1.5">提示：不添加任何提示词，直接提问模型，观察原生回答。Key在服务端，不暴露到浏览器。</div>
    <div id="modelChatBox" style="background:rgba(0,0,0,.02);border:1px solid rgba(0,0,0,.08);border-radius:10px;padding:10px;min-height:280px;max-height:400px;overflow-y:auto;margin-bottom:8px">
      <div style="text-align:center;padding:30px;color:#999;font-size:13px">输入问题开始测试</div>
    </div>
    <div style="display:flex;gap:4px;align-items:stretch">
      <textarea id="modelInput" style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid rgba(0,0,0,.1);font-size:13px;background:#fff;font-family:inherit;resize:none;min-height:36px;line-height:1.5" placeholder="输入问题，按 Enter 发送..." rows="1"></textarea>
      <button class="btn on" id="modelSendBtn" onclick="sendModelMsg()" style="font-size:12px;padding:8px 16px;white-space:nowrap">发送</button>
    </div>
  </div>
</div>

<!-- 移动选择器（默认隐藏） -->
<div class="move-overlay" id="moveOverlay" style="display:none">
  <div class="move-card">
    <h4>📌 移动到哪一页？</h4>
    <div class="sub" id="moveSub">当前问题关联 P?</div>
    <div class="move-grid" id="moveGrid"></div>
    <div class="move-actions">
      <button class="btn" onclick="closeMovePicker()">取消</button>
      <button class="btn" id="moveConfirm" style="background:#1f6feb;border-color:#1f6feb;color:#fff;font-weight:600">✅ 确认移动</button>
    </div>
  </div>
</div>

<script>
// ── 全局状态 ──
var _qdata = {};
var _moveTargetId = null;
var _moveTargetPage = null;
var _offlineMode = false;  // true=本地 JSON 模式，不调写 API
var _filterPage = false;   // true=仅显示当前页问题
var _deletedIds = {};      // 已删除的问题 ID，防止轮询复活

// 从 localStorage 恢复已删除 ID 列表
try {
  var saved = localStorage.getItem('ppt_deleted_ids');
  if(saved) _deletedIds = JSON.parse(saved);
} catch(e) { _deletedIds = {}; }

// ── 翻页 ──
function goToSlide(n){
  fetch('/api/control/go',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slide:n})}).catch(function(e){console.warn('[控制] 指令失败:',e);});
}

// ── AI 回答（发送问题给 LLM，答案展示在 PPT 上，下弹出方式）──
function aiAnswer(id){
  var qi = _qdata[id];
  if(!qi) return;
  qi.loading = true;
  qi.answer = '';
  qi.error = '';
  renderQuestions();
  // 获取当前页面内容（从 speechData 中获取）
  var page = qi.p || 1;
  var pageTitle = '';
  var pageContent = '';
  if(_speechData && _speechData[page]){
    pageTitle = _speechData[page].t || '';
    pageContent = _speechData[page].c || '';
  }
  // 用改写后的问题作为参数，同时传递页面信息
  var questionText = qi.q || qi.o || '';
  fetch('/api/questions/ai-answer', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      id:id,
      question: questionText,
      page: page,
      page_title: pageTitle,
      page_content: pageContent
    })
  }).then(function(r){return r.json();}).then(function(d){
    if(d.ok){
      qi.answer = d.answer;
      qi.loading = false;
      renderQuestions();
      // 发送给 PPT 展示页：下弹出方式显示答案
      fetch('/api/control/go',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slide:qi.p, answer:d.answer, answer_question:questionText, answer_slide:qi.p, answer_mode:'bottom-popup'})}).catch(function(e){console.warn('[控制] 指令失败:',e);});
      try{ new BroadcastChannel('ppt-ctrl').postMessage({type:'voice-answer',question:questionText,answer:d.answer,slide:qi.p,mode:'bottom-popup'}); }catch(e){}
      try{ new BroadcastChannel('ai3-control').postMessage({type:'voice-answer',question:questionText,answer:d.answer,slide:qi.p,mode:'bottom-popup'}); }catch(e){}
    } else {
      qi.error = d.error || '回答失败';
      qi.loading = false;
      renderQuestions();
    }
  }).catch(function(){
    qi.error = '网络错误';
    qi.loading = false;
    renderQuestions();
  });
}

// ── 重新匹配问题到正确页面 + 重新生成回答 ──
function reMatchQuestion(id){
  var btn = document.getElementById('rematch_' + id);
  if(btn){ btn.textContent = '⏳ 匹配中...'; btn.disabled = true; }
  fetch('/api/questions/re-match', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id:id})
  }).then(function(r){return r.json();}).then(function(d){
    if(!d.ok){
      if(btn){ btn.textContent = '❌ 失败'; setTimeout(function(){ btn.textContent = '🔄 重匹配'; btn.disabled = false; }, 1500); }
      return;
    }
    var qi = _qdata[String(id)];
    if(qi){
      qi.p = d.page;
      qi.answer = d.answer || qi.answer;
    }
    renderQuestions();
    // 有新回答就同步到 PPT
    if(d.answer){
      fetch('/api/control/go',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slide:d.page, answer:d.answer, answer_question:(qi?qi.q:''), answer_slide:d.page, answer_mode:'bottom-popup'})}).catch(function(e){console.warn('[控制] 指令失败:',e);});
      try{ new BroadcastChannel('ppt-ctrl').postMessage({type:'voice-answer',question:(qi?qi.q:''),answer:d.answer,slide:d.page,mode:'bottom-popup'}); }catch(e){}
      try{ new BroadcastChannel('ai3-control').postMessage({type:'voice-answer',question:(qi?qi.q:''),answer:d.answer,slide:d.page,mode:'bottom-popup'}); }catch(e){}
    }
  }).catch(function(){
    if(btn){ btn.textContent = '❌ 网络错误'; setTimeout(function(){ btn.textContent = '🔄 重匹配'; btn.disabled = false; }, 2000); }
  });
}

// ── 删除问题 ──
function deleteQuestion(id){
  if(!confirm('确定删除这条问题吗？')) return;
  var sid = String(id);
  _deletedIds[sid] = true;
  try { localStorage.setItem('ppt_deleted_ids', JSON.stringify(_deletedIds)); } catch(e) {}
  delete _qdata[sid];
  renderQuestions();
  // 离线模式不调 API，仅本地删除
  if(_offlineMode) return;
  fetch('/api/questions/delete',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id:id})
  }).then(function(r){return r.json();}).then(function(d){
    if(!d.ok){ console.warn('服务端删除失败，重新拉取'); loadQuestions(); }
  }).catch(function(e){
    // 网络错误：忽略，等待下次轮询时服务端同步
    console.warn('delete API 不可用，仅本地删除');
  });
}

// ── 移动问题到其他 P ──
function showMovePicker(id){
  _moveTargetId = id;
  var qi = _qdata[id];
  if(!qi) return;
  _moveTargetPage = qi.p || 1;
  document.getElementById('moveSub').textContent = '当前问题关联 P' + (qi.p||'?') + ' · 「' + (qi.q||'').substring(0,30) + '…」';
  // 构建页码网格
  var g = document.getElementById('moveGrid');
  g.innerHTML = '';
  for(var i=1;i<=TOTAL;i++){
    var d = document.createElement('div');
    d.className = 'move-dot' + (i===_moveTargetPage?' cur':'');
    d.textContent = 'P'+i;
    d.onclick = (function(p){return function(){
      _moveTargetPage = p;
      document.querySelectorAll('.move-dot').forEach(function(dd){dd.className='move-dot';});
      this.className = 'move-dot cur';
    };})(i);
    g.appendChild(d);
  }
  document.getElementById('moveOverlay').style.display = 'flex';
}

function closeMovePicker(){
  document.getElementById('moveOverlay').style.display = 'none';
  _moveTargetId = null;
}

function confirmMove(){
  if(!_moveTargetId || !_moveTargetPage) return;
  var qi = _qdata[_moveTargetId];
  if(!qi) return;
  var oldPage = qi.p;
  qi.p = _moveTargetPage;
  renderQuestions();
  closeMovePicker();
  // 离线模式不调 API，仅本地移动
  if(_offlineMode) return;
  fetch('/api/questions/move',{

// ── 加载问题列表 ──
function applyQuestionsData(d){
  var bp = d.by_page || {};
  for(var k in bp){
    var qs = bp[k];
    for(var i=0;i<qs.length;i++){
      var q = qs[i];
      var sid = String(q.id);
      if(_deletedIds[sid]) continue;
      var refined = q.refined || q.question;
      if(!_qdata[sid]){
        _qdata[sid] = {
          q: refined,           // 显示用：LLM 改写后的问题
          o: q.original || q.question,  // 原始问题（用于对比显示）
          p: q.page||1,
          answer: '', loading: false, error: '',
          n: q.name||'匿名',
          t: q.type,             // 'share' | 'question' | null
          s: q.source || 'manual',  // 来源
          cp: q.candidate_pages || [],  // 候选页
          mp: q.multi_page || false    // 多页面标记
        };
      }
      else {
        _qdata[sid].q = refined;
        _qdata[sid].o = q.original || q.question;
        _qdata[sid].p = q.page||1;
        _qdata[sid].n = q.name||'匿名';
        _qdata[sid].t = q.type;
        _qdata[sid].s = q.source || 'manual';
        _qdata[sid].cp = q.candidate_pages || [];
        _qdata[sid].mp = q.multi_page || false;
      }
    }
  }
  renderQuestions();
}

function loadQuestions(){
  fetch('/api/questions').then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(d){
    _offlineMode = false;
    applyQuestionsData(d);
    // 在线模式：同步 localStorage 中已删除的 ID 到服务器
    syncDeletedToServer();
  }).catch(function(e){
    console.warn('API /api/questions 不可用，尝试加载本地 questions.json ...');
    fetch('questions.json').then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    }).then(function(d){
      _offlineMode = true;
      // questions.json 是纯数组格式，转换为 API 的 by_page 格式
      if(Array.isArray(d)){
        var byPage = {};
        for(var i=0;i<d.length;i++){
          var q = d[i];
          var p = q.page || 0;
          if(!byPage[p]) byPage[p] = [];
          byPage[p].push(q);
        }
        d = {by_page: byPage, total: d.length, classified: d.length, slides: []};
      }
      applyQuestionsData(d);
      var hint = document.getElementById('qHint');
      if(hint) hint.textContent = '📡 离线模式 · 问题数据来自本地缓存';
    }).catch(function(e2){
      console.error('Q&A error:', e2);
      var l = document.getElementById('qlist');
      if(l) l.innerHTML = '<div style="text-align:center;padding:30px;color:#e53e3e">❌ 加载失败（API 和本地缓存均不可用）</div>';
    });
  });
}

// ── 重置已删除 ──
function resetDeleted(){
  if(!confirm('确定恢复所有已删除的问题吗？')) return;

  try { localStorage.removeItem('ppt_deleted_ids'); } catch(e) {}
  loadQuestions();
}

// ── 同步离线删除到服务器 ──
function syncDeletedToServer(){
  var ids = Object.keys(_deletedIds);
  if(ids.length === 0) return;
  // 逐个同步，避免并发写坏 questions.json
  var i = 0;
  function next(){
    if(i >= ids.length) return;
    var sid = ids[i];
    fetch('/api/questions/delete',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id: parseInt(sid)})
    }).then(function(r){return r.json();}).then(function(d){
      if(d.ok){
        delete _deletedIds[sid];
        try { localStorage.setItem('ppt_deleted_ids', JSON.stringify(_deletedIds)); } catch(e) {}
      }
      i++;
      next();
    }).catch(function(){
      i++;
      next();
    });
  }
  next();
}

// ── 渲染问题列表 ──
function renderQuestions(){
  var list = document.getElementById('qlist');
  if(!list) return;
  var ids = Object.keys(_qdata);
  // 按页码排序
  ids.sort(function(a,b){ return (_qdata[a].p||0) - (_qdata[b].p||0); });
  // 筛选
  if(_filterPage){
    ids = ids.filter(function(id){ return _qdata[id].p === cur; });
  }
  var total = ids.length;
  // 总数显示（始终显示全部问题数）
  var cnt = document.getElementById('qCount');
  var allTotal = Object.keys(_qdata).length;
  if(cnt) cnt.textContent = _filterPage ? (total + ' / ' + allTotal) : allTotal;
  if(total === 0){
    list.innerHTML = '<div style="text-align:center;padding:30px;color:#999;font-size:13px">💬 暂无问题</div>';
    return;
  }
  // 来源图标映射
  var srcIcon = {'qrcode':'📱','voice':'🎤','manual':'⌨️'};
  var srcLabel = {'qrcode':'扫码','voice':'语音','manual':'输入'};
  var h = '';
  for(var i=0;i<ids.length;i++){
    var id = ids[i];
    var qi = _qdata[id];
    var icon = srcIcon[qi.s] || '⌨️';
    var label = srcLabel[qi.s] || '输入';
    // 判断是否有改写差异
    var hasDiff = qi.o && qi.q && qi.o !== qi.q;
    h += '<div style="background:rgba(0,0,0,.03);border:1px solid rgba(0,0,0,.08);border-radius:8px;padding:10px 12px;margin-bottom:6px">';
    // 头部：用户 + 页码 + 来源图标 + 多页面标记
    h += '<div style="display:flex;gap:6px;margin-bottom:4px;align-items:center">';
    h += '<span style="color:#777;font-size:12px">👤 ' + (qi.n||'匿名') + '</span>';
    h += '<span style="color:#1f6feb;font-size:10px;background:rgba(0,113,227,.1);padding:1px 6px;border-radius:4px;font-weight:500">P' + (qi.p||'?') + '</span>';
    h += '<span title="' + label + '" style="font-size:14px">' + icon + '</span>';
    if(qi.mp){
      h += '<span style="color:#e67700;font-size:10px;background:rgba(230,119,0,.1);padding:1px 6px;border-radius:4px">多页候选</span>';
    }
    h += '</div>';
    // 问题正文（改写后）
    h += '<div style="color:#222;line-height:1.6;margin-bottom:2px;font-size:13px">' + qi.q + '</div>';
    // 改写对比（仅当有差异时显示）
    if(hasDiff){
      h += '<div style="font-size:11px;color:#999;background:rgba(0,0,0,.04);border-radius:4px;padding:4px 8px;margin-bottom:4px">';
      h += '<span style="color:#999">📝 原：</span><span style="color:#666">' + qi.o.substring(0,100) + '</span>';
      h += '</div>';
    }
    // AI 回答结果
    if(qi.answer){
      h += '<div style="font-size:12px;color:#222;padding:8px;background:rgba(0,0,0,.15);border-radius:6px;margin-bottom:6px">🤖 ' + qi.answer + '</div>';
    } else if(qi.loading){
      h += '<div style="font-size:12px;color:#777;padding:8px;text-align:center">🤔 AI思考中...</div>';
    } else if(qi.error){
      h += '<div style="font-size:12px;color:#e53e3e;padding:8px">❌ ' + qi.error + '</div>';
    }
    // 按钮行：跳转 | 回答 | 重匹配 | 移动 | 删除
    h += '<div class="q-actions">';
    h += '<button class="btn small" onclick="goToSlide(' + (qi.p||1) + ')">🔙 跳转</button>';
    if(!qi.answer && !qi.loading){
      h += '<button class="btn small on" onclick="aiAnswer(' + id + ')">🤖 回答</button>';
    }
    h += '<button class="btn small" onclick="reMatchQuestion(' + id + ')" id="rematch_' + id + '">🔄 重匹配</button>';
    h += '<button class="btn small" onclick="showMovePicker(' + id + ')">📌 移动</button>';
    h += '<button class="btn small danger" onclick="deleteQuestion(' + id + ')">🗑 删除</button>';
    h += '</div>';
    h += '</div>';
  }
  list.innerHTML = h;
  updateQuestionHint();
}

function loadPollResults(){
  var container = document.getElementById('pollResults');
  if(!container) return;
  fetch('/api/extra-poll').then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(d){
    var labels = {'ai_tool':'🤖 最常用的AI','usage':'💻 使用方式'};
    var colors = ['#4A90D9','#5BA0E8','#3fb950','#d29922','#f78166','#a371f7','#db6d28'];
    var depthOrder = ['基本没用过','没用过','网页版','手机App','集成到业务系统','AI Agent(API接入)','Vibe coding(API接入)'];
    function getDepth(opt){ var idx = depthOrder.indexOf(opt); return idx >= 0 ? idx : 999; }
    var h = '';
    var keys = Object.keys(d);
    if(keys.length === 0){
      container.innerHTML = '<div style="text-align:center;padding:30px;color:#999;font-size:13px">📊 暂无投票数据</div>';
      return;
    }
    for(var i=0;i<keys.length;i++){
      var id = keys[i], data = d[id];
      var total = 0, opts = Object.keys(data);
      for(var j=0;j<opts.length;j++) total += data[opts[j]];
      // 排序
      if(id === 'ai_tool'){ opts.sort(function(a,b){ return data[b] - data[a]; }); }
      else { opts.sort(function(a,b){ return getDepth(a) - getDepth(b); }); }
      h += '<div style="background:rgba(0,0,0,.03);border:1px solid rgba(0,0,0,.08);border-radius:10px;padding:14px;margin-bottom:10px">';
      h += '<div style="font-size:14px;color:#222;font-weight:700;margin-bottom:2px">' + (labels[id]||id) + '</div>';
      h += '<div style="font-size:11px;color:#999;margin-bottom:10px">共 ' + total + ' 票</div>';
      for(var k=0;k<opts.length;k++){
        var opt = opts[k], cnt = data[opt];
        var pct = total > 0 ? Math.round(cnt/total*100) : 0;
        var col = colors[k % colors.length];
        h += '<div style="margin-bottom:8px">';
        h += '<div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;margin-bottom:3px">';
        h += '<span style="font-size:13px;color:#444">' + opt + '</span>';
        h += '<span style="font-size:13px;font-weight:700;color:#111;white-space:nowrap">' + cnt + '<span style="font-size:10px;color:#888;font-weight:400">票</span> <span style="color:#1f6feb;font-size:12px">' + pct + '%</span></span>';
        h += '</div>';
        h += '<div style="height:8px;background:rgba(0,0,0,.06);border-radius:4px;overflow:hidden"><div style="height:100%;width:' + pct + '%;background:' + col + ';border-radius:4px;transition:width .5s"></div></div>';
        h += '</div>';
      }
      h += '</div>';
    }
    container.innerHTML = h;
  }).catch(function(e){
    container.innerHTML = '<div style="text-align:center;padding:30px;color:#e53e3e;font-size:13px">❌ 加载投票失败</div>';
  });
}

function renderModelChat(){
  var box = document.getElementById('modelChatBox');
  if(!box) return;
  if(_modelMsgs.length === 0){
    box.innerHTML = '<div style="text-align:center;padding:30px;color:#999;font-size:13px">输入问题开始测试</div>';
    return;
  }
  var h = '';
  for(var i=0;i<_modelMsgs.length;i++){
    var m = _modelMsgs[i];
    if(m.role === 'user'){
      h += '<div style="display:flex;justify-content:flex-end;margin-bottom:6px"><div style="max-width:80%;padding:6px 10px;border-radius:8px 8px 2px 8px;background:#1f6feb;color:#fff;font-size:13px;line-height:1.5">' + escapeHtml(m.content) + '</div></div>';
    } else {
      h += '<div style="display:flex;justify-content:flex-start;margin-bottom:6px"><div style="max-width:80%;padding:6px 10px;border-radius:8px 8px 8px 2px;background:rgba(0,0,0,.06);color:#222;font-size:13px;line-height:1.5;white-space:pre-wrap">' + escapeHtml(m.content) + '</div></div>';

  if(_modelSending){
    h += '<div style="display:flex;justify-content:flex-start;margin-bottom:6px"><div style="padding:6px 10px;border-radius:8px 8px 8px 2px;background:rgba(0,0,0,.06);color:#999;font-size:13px">🤔 模型思考中...</div></div>';
  }
  box.innerHTML = h;
  box.scrollTop = box.scrollHeight;
}
function escapeHtml(s){
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function sendModelMsg(){
  if(_modelSending) return;
  var input = document.getElementById('modelInput');
  var q = input.value.trim();
  if(!q) return;
  input.value = '';
  input.style.height = 'auto';
  _modelMsgs.push({role:'user', content: q});
  _modelSending = true;
  renderModelChat();
  // 调用服务端接口（Key 在服务端，不暴露到浏览器）
  fetch('/api/deepseek/ask', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({question: q})
  }).then(function(r){
    return r.json();
  }).then(function(d){
    if(d.ok){
      var answer = d.answer || '(无应答)';
      _modelMsgs.push({role:'assistant', content: answer});
      _modelSending = false;
      renderModelChat();
      if(_modelPopupOn){
        fetch('/api/control/go',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slide:cur,modelPopup:{show:true,question:q,answer:answer}})}).catch(function(e){console.warn('[控制] 模型投屏失败:',e);});
      }
    } else {
      _modelMsgs.push({role:'assistant', content: '❌ ' + (d.error||'回答失败')});
      _modelSending = false;
      renderModelChat();
    }
  }).catch(function(err){
    _modelMsgs.push({role:'assistant', content: '❌ 网络错误'});
    _modelSending = false;
    renderModelChat();
  });
}
function handleModelKeydown(e){
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendModelMsg();
  }
}

document.addEventListener('DOMContentLoaded', function(){
  var modelInput = document.getElementById('modelInput');
  if(modelInput) modelInput.addEventListener('keydown', handleModelKeydown);
  initModelKey();
});

var ACT={1:{l:'揭示主题',s:'揭示主题',h:'重置问句'},2:{l:'展开答案',s:'展开答案',h:'收起答案'},4:{l:'展开卡片',s:'展开三阶段',h:'收起卡片'}};
// ── 动效按钮栏配置（按页码添加按钮，注释好哪一页显示什么）──
// 格式：ACTIONS[页码] = ['<button ...>', '<button ...>']
var ACTIONS = {
  2: ['<button class="btn" id="aBtn">▶ '+ACT[1].l+'</button>'],                                        // P2：从会用AI动效
  3: ['<button class="btn" id="aBtn">▶ '+ACT[2].l+'</button>'],                                        // P3：展开答案
  5: ['<button class="act-btn btn" id="p4b1">① 预训练</button>', '<button class="act-btn btn" id="p4b2">② 指令微调</button>', '<button class="act-btn btn" id="p4b3">③ RLHF</button>', '<button class="act-btn btn" id="p4b4">⚠️ 局限</button>'],
  7: ['<button class="btn" onclick="toggleFilePopup()">📄 大纲</button><button class="btn" onclick="stopScroll()" style="font-size:16px">⏹</button><button class="btn" onclick="startScroll()" style="font-size:16px">⬇</button>'],
  13: ['<button class="btn" onclick="showSfRulesPopup()">📄 规则</button><button class="btn" onclick="stopSfScroll()" style="font-size:16px">⏹</button><button class="btn" onclick="startSfScroll()" style="font-size:16px">⬇</button>'],                             // P13：显示对账规则
};
var CC=0;
var _p4open=0;
var _speechData = {};  // 从 speech.md 动态加载

// 演讲稿服务器地址（本地不存在时从服务器下载）
var SPEECH_SERVER_URL = 'https://8008.cmfok.online/speech.md';

function loadSpeech(){
  fetch('speech.md',{cache:'no-store'}).then(function(r){
    if(r.status >= 400) throw new Error('HTTP '+r.status);  // 304 是正常响应，不是错误
    return r.text();
  }).then(function(md){
    parseSpeech(md, 'local');
  }).catch(function(e){
    console.warn("speech.md 本地加载失败，尝试从服务器下载...");
    fetch(SPEECH_SERVER_URL,{cache:'no-store'}).then(function(r){
      if(r.status >= 400) throw new Error('HTTP '+r.status);
      return r.text();
    }).then(function(md){
      console.log("✅ 已从服务器加载演讲稿");
      parseSpeech(md, 'server');
    }).catch(function(e2){
      console.warn("服务器演讲稿也加载失败，使用备用内容");
      _speechData = S_FALLBACK;
      upd(cur);
    });
  });
}

// 从服务器手动同步演讲稿
function syncSpeechFromServer(){
  var btn = document.getElementById('syncSpeechBtn');
  if(btn){ btn.textContent = '⏳ 同步中...'; btn.disabled = true; }
  fetch(SPEECH_SERVER_URL,{cache:'no-store'}).then(function(r){
    if(r.status >= 400) throw new Error('HTTP '+r.status);
    return r.text();
  }).then(function(md){
    console.log("✅ 已从服务器同步演讲稿");
    parseSpeech(md, 'server');
    if(btn){ btn.textContent = '✅ 已同步'; setTimeout(function(){ btn.textContent = '⬇ 同步服务端'; btn.disabled = false; }, 2000); }
  }).catch(function(e){
    console.warn("从服务器同步演讲稿失败");
    if(btn){ btn.textContent = '❌ 同步失败'; btn.disabled = false; }
  });
}

function parseSpeech(md, source){
  var lines = md.split(/\r?\n/);
  var curSlide = null, curTitle = '', curContent = [];
  for(var i=0;i<lines.length;i++){
    var line = lines[i];
    var m = line.match(/^## Slide (\d+)\s*[—\-—]\s*(.*)/);
    if(m){
      // Save previous slide
      if(curSlide && curContent.length){
        var txt = curContent.join('\n').trim();
        txt = txt.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>").replace(/\n/g, "<br>");
        _speechData[curSlide] = {t: curTitle, c: txt};
      }
      curSlide = parseInt(m[1]);
      curTitle = m[2].trim();
      curContent = [];
    } else if(curSlide && line.trim() !== '---'){
      curContent.push(line);
    }
  }
  // Last slide
  if(curSlide && curContent.length){
    var txt = curContent.join('\n').trim();
    txt = txt.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>").replace(/\n/g, "<br>");
    _speechData[curSlide] = {t: curTitle, c: txt};
  }
  upd(cur);
}

var S_FALLBACK={
1:{t:'封面',c:'<strong>AI 真垃圾</strong>——两个阶段的感觉。第一阶段：刚开始用觉得它无所不能，实际用起来各种不靠谱，你会觉得：<strong>AI 真垃圾！</strong>第二阶段：用久了，了解了它的底层运行逻辑。我核心的关切：<strong>如何让 AI 可控地输出我想要的结果。</strong>'},
};

loadSpeech();

// ── 编辑演讲稿 ──
var _editingSlide = null;
function startEditSpeech(){
  _editingSlide = cur;
  var sc = document.getElementById('sc');
  var ta = document.getElementById('scEdit');
  var raw = _speechData[cur] ? _speechData[cur].c : '';
  raw = raw.replace(/<br>/g, '\n').replace(/<strong>/g, '**').replace(/<\/strong>/g, '**');
  ta.value = raw;
  sc.style.display = 'none';
  ta.style.display = 'block';
  document.getElementById('editBtns').style.display = 'none';
  document.getElementById('saveBtns').style.display = 'flex';
  // 隐藏底部导航和动效按钮
  var bn = document.querySelector('.bottom-nav');
  if(bn) bn.style.display = 'none';
  var ab = document.getElementById('actBox');
  if(ab) ab.style.display = 'none';
  ta.focus();
}
function cancelEditSpeech(){
  _editingSlide = null;
  document.getElementById('sc').style.display = 'block';
  document.getElementById('scEdit').style.display = 'none';
  document.getElementById('editBtns').style.display = 'flex';
  document.getElementById('saveBtns').style.display = 'none';
  // 恢复底部导航
  var bn = document.querySelector('.bottom-nav');

}
function saveSpeech(){
  if(!_editingSlide){ console.log('[saveSpeech] _editingSlide 为空，跳过'); return; }
  var ta = document.getElementById('scEdit');
  var content = ta.value.trim();
  console.log('[saveSpeech] 开始保存 slide='+_editingSlide+' content长度='+content.length);
  fetch('/api/control/go', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({slide:_editingSlide, _speech:{slide:_editingSlide, content:content}})
  }).then(function(r){
    console.log('[saveSpeech] 收到响应 status='+r.status+' ok='+r.ok);
    return r.json().then(function(d){
      console.log('[saveSpeech] JSON解析成功', d);
      var sp = d.speech;
      if(sp && sp.ok){
        var txt = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
        if(!_speechData[_editingSlide]) _speechData[_editingSlide] = {t: '', c: ''};
        _speechData[_editingSlide].c = txt;
        upd(cur);
        cancelEditSpeech();
      } else if(sp) {
        alert('保存失败: ' + (sp.error||'未知错误'));
      } else {
        alert('保存失败: 未知错误');
      }
    }).catch(function(e2){
      console.log('[saveSpeech] JSON解析失败', e2);
      alert('保存失败: 服务器返回异常 (HTTP ' + r.status + ')');
    });
  }).catch(function(e){
    console.log('[saveSpeech] fetch失败', e);
    alert('网络错误: ' + (e.message||'无法连接服务器'));
  });
}


// 构建页码网格
function buildPageGrid(){
  var g=document.getElementById('pg');
  g.innerHTML='';
  for(var i=1;i<=TOTAL;i++){
    // P22 不在网格显示，通过顶部「问答·P22」按钮访问
    if(i===22) continue;
    var d=document.createElement('div');
    d.className='page-dot'+(i===cur?' active':'');
    d.textContent='P'+i;
    d.onclick=function(n){return function(){go(n);};}(i);
    g.appendChild(d);
  }
  document.getElementById('tp').textContent=TOTAL;
}

var _lastUserNav = 0;  // 用户最后操作时间戳

function go(n){
  if(n<1||n>TOTAL)return;
  _lastUserNav = Date.now();
  cur=n;
  document.querySelectorAll('.page-dot').forEach(function(d,i){d.className='page-dot'+(i+1===n?' active':'');});
  document.getElementById('cp').textContent='P'+n;
  upd(n);
  CC=0;
  fetch('/api/control/go',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slide:n})}).catch(function(e){console.error("go error:",e)});
  // 同时广播到本地 PPT
  if(_bc) _bc.postMessage({type:'goto',slide:n});
  // ── 动效按钮栏（统一管理：在 ACTIONS 里加 {page: N, html: '...'} 即可）──
  var ab=document.getElementById('actBox');
  // 获取当前页的按钮配置
  var btns = (ACTIONS[n] || []).slice();
  if(btns.length > 0){
    ab.style.display = 'flex';
    ab.innerHTML = btns.join('');
    // 重新绑定事件（因为 innerHTML 会清除旧事件）
    bindActionEvents(n);
  } else {
    ab.style.display = 'none';
  }

  // ── 按钮动作配置（按页码）──
  // 格式：{ page: N, html: '<button...>', action: function }
  // 或直接用 onclick 在 html 里写死简单动作
  // 复杂动作（如 toggle）在 bindActionEvents 里处理
  function bindActionEvents(n){
    if(n===2){  // P2：从会用AI动效
      var b = document.getElementById('aBtn');
      if(b) b.onclick = function(){
        var isOn = b.classList.contains('on');
        if(isOn){ b.classList.remove('on'); b.textContent='▶ '+ACT[1].l; }
        else { b.classList.add('on'); b.textContent=ACT[1].h; }
        fetch('/api/control/go',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slide:2,coverP1:!isOn})}).catch(function(e){console.warn('[控制] 指令失败:',e);});
      };
    }
    if(n===3){  // P3：展开答案
      var b = document.getElementById('aBtn');
      if(b) b.onclick = function(){
        var isOn = b.classList.contains('on');
        if(isOn){ b.classList.remove('on'); b.textContent='▶ '+ACT[2].l; }
        else { b.classList.add('on'); b.textContent=ACT[2].h; }
        fetch('/api/control/go',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slide:3,expand:!isOn})}).catch(function(e){console.warn('[控制] 指令失败:',e);});
      };
    }
    if(n===5){  // P5：四张卡片互斥展开
      // 先查服务器当前展开的是哪张，恢复按钮状态
      fetch('/api/control/current',{cache:'no-store'}).then(function(r){return r.json();}).then(function(st){
        if(st && st.p4open && st.p4open>0){
          var b = document.getElementById('p4b'+st.p4open);
          if(b) b.classList.add('on');
        }
      }).catch(function(e){console.warn('[控制] 指令失败:',e);});
      for(var _pi=1;_pi<=4;_pi++){
        (function(idx){
          var b = document.getElementById('p4b'+idx);
          if(!b) return;
          b.onclick = function(){
            var nowOn = b.classList.contains('on');
            document.querySelectorAll('#actBox .act-btn').forEach(function(bb){bb.classList.remove('on');});
            if(!nowOn){
              b.classList.add('on');
              fetch('/api/control/go',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slide:5,p4open:idx})}).catch(function(e){console.warn('[控制] 指令失败:',e);});
            } else {
              fetch('/api/control/go',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slide:5,p4open:0})}).catch(function(e){console.warn('[控制] 指令失败:',e);});
            }
          };
        })(_pi);
      }
    }
  }
}

function upd(n){
  var s=_speechData[n];
  if(!s)return;
  document.getElementById('sl').textContent='P'+n+' · '+s.t;
  document.getElementById('sc').innerHTML = s.c;
  var nx=_speechData[n+1];
  if(nx){
    document.getElementById('nc').innerHTML='<strong>'+(n+1>22?'附':(n+1===6?'转':'P'+(n+1>6?n:n+1)))+' · '+nx.t+'</strong><br>'+nx.c.substring(0,100).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')+'…';
  }else{
    document.getElementById('nc').innerHTML='— 结束 —';
  }
  if(typeof updateQuestionHint==='function') updateQuestionHint();
}

// ── 多控制台同步 ──
function syncState(st){
  if(!st) return;
  // 同步页码（跳过：用户刚刚操作过，避免轮询拿到老状态覆盖新操作）
  if(st.slide && st.slide !== cur){
    if(Date.now() - _lastUserNav < 800) return;
    var n=st.slide;
    cur=n;
    document.querySelectorAll('.page-dot').forEach(function(d,i){d.className='page-dot'+(i+1===n?' active':'');});
    document.getElementById('cp').textContent='P'+n;
    upd(n);
  }
  // 同步锁定状态
  if(st.lock!==undefined && st.lock!==locked){
    locked=st.lock;
    updateLockBtn();
  }
  // 同步 P1 封面动效状态
  if(st.coverP1!==undefined){
    var cb = document.getElementById('aBtn');
    if(cb){
      if(st.coverP1){ cb.classList.add('on'); cb.textContent=ACT[1].h; }
      else { cb.classList.remove('on'); cb.textContent='\u25B6 '+ACT[1].l; }
    }
  }
  // 同步 P2 展开状态
  if(st.expand!==undefined){
    var ab = document.getElementById('aBtn');
    if(ab){
      if(st.expand){ ab.classList.add('on'); ab.textContent=ACT[2].h; }
      else { ab.classList.remove('on'); ab.textContent='\u25B6 '+ACT[2].l; }
    }
  }
  // 同步 P5 卡片展开状态
  if(st.p4open!==undefined && st.p4open!==_p4open){
    _p4open=st.p4open;
    if(cur===5){
      document.querySelectorAll('#actBox .act-btn').forEach(function(bb){bb.classList.remove('on');});
      if(_p4open>0){
        var b = document.getElementById('p4b'+_p4open);
        if(b) b.classList.add('on');
      }
    }
  }
}
// 每1.5秒轮询服务器，多控制台/多标签页状态一致
setInterval(function(){
  fetch('/api/control/current').then(function(r){return r.json();}).then(function(st){if(st)syncState(st);}).catch(function(e){console.warn('[控制] 指令失败:',e);});
}, 1500);

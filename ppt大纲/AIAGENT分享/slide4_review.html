<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>第4页 · 预览</title>
<link rel="stylesheet" href="assets/fonts.css">
<link rel="stylesheet" href="assets/base.css">
<link rel="stylesheet" href="assets/animations/animations.css">
<link rel="stylesheet" href="assets/themes/minimal-white.css" id="theme-link">
<style>
:root{--font-display:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;--anim-dur:.7s}
body{line-height:1.35!important;margin:0;padding:20px;background:var(--bg)}
.slide p{margin-bottom:6px}
.slide{position:relative!important;opacity:1!important;transform:none!important;pointer-events:auto!important;width:100%;height:auto!important;min-height:100vh;padding:clamp(32px,3vw,56px) clamp(48px,5vw,100px);display:flex;flex-direction:column;justify-content:flex-start;overflow:visible!important}
body .h1{font-size:clamp(80px,12vw,200px)!important}
body .h2{font-size:clamp(56px,8vw,130px)!important}
.tag{display:inline-block;padding:5px 16px;border-radius:var(--radius-sm);font-size:18px;font-weight:500;margin:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:clamp(14px,2.5vw,24px)}
.eco-bar{display:flex;flex-direction:column;gap:8px;margin-top:20px}
.eco-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.eco-bar .pill{font-size:clamp(14px,1.6vw,22px);opacity:.85;padding:4px 12px;border-radius:8px;border:2px solid var(--border);white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.eco-bar .pill .ic{display:inline-block;width:clamp(18px,2vw,28px);height:clamp(18px,2vw,28px);flex-shrink:0;border-radius:6px}
.eco-bar .pill img{width:clamp(14px,1.6vw,22px);height:clamp(14px,1.6vw,22px);flex-shrink:0;border-radius:6px;object-fit:contain}
.eco-bar .pill img.err+.dot{display:inline-block;width:clamp(12px,1.4vw,18px);height:clamp(12px,1.4vw,18px);border-radius:6px;flex-shrink:0}
.ca-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;cursor:pointer;transition:all .25s;margin-bottom:6px}
.ca-card:hover{background:var(--bg-soft)}
.ca-card .ch{display:flex;justify-content:space-between;align-items:center;font-size:22px;font-weight:600}
.ca-card .ch .ic{transition:transform .25s;font-size:16px}
.ca-card.open .ch .ic{transform:rotate(180deg)}
.ca-card .cb{max-height:0;overflow:hidden;transition:max-height .4s,opacity .25s;opacity:0}
.ca-card.open .cb{max-height:800px;opacity:1;margin-top:10px}
.ca-card .cb-inner{padding-top:10px;border-top:1px solid var(--border);font-size:20px;line-height:1.7;color:var(--text-2)}
.brand-box{border:1px solid var(--border);border-radius:var(--radius);padding:6px;display:flex;gap:2px;background:var(--bg-soft)}
.brand-box-company{width:150px;display:flex;flex-direction:column;gap:8px}
.brand-box-model{width:120px;display:flex;flex-direction:column;gap:8px;align-items:center}
</style>
</head>
<body>

<section class="slide" data-title="模型">
  <div style="width:100%">
    <p class="kicker" style="margin-bottom:24px">MODEL · LLM / LMM</p>
    <h1 class="h1" style="margin-bottom:4px;font-size:clamp(36px,5vw,72px)">大语言模型</h1>
  </div>
    <div class="g2" style="flex:1;align-items:center">
    <div style="display:flex;flex-direction:row;gap:12px">
      <!-- 国内框 -->
      <div class="brand-box">
        <div class="brand-box-company">
          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0">
            <img src="ai/icon/brand/bytedance-color.svg" style="width:22px;height:22px" onerror="this.style.display='none'">
            <img src="ai/icon/brand/bytedance-text.svg" style="height:16px;width:auto" onerror="this.style.display='none'">
          </div>
          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0">
            <img src="ai/icon/brand/alibaba-color.svg" style="width:22px;height:22px" onerror="this.style.display='none'">
            <img src="ai/icon/brand/alibaba-text.svg" style="height:16px;width:auto" onerror="this.style.display='none'">
          </div>
          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0">
            <img src="ai/icon/brand/kimi.svg" style="width:22px;height:22px" onerror="this.style.display='none'">
            <img src="ai/icon/brand/kimi-text.svg" style="height:16px;width:auto" onerror="this.style.display='none'">
          </div>
          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0">
            <img src="ai/icon/brand/deepseek-color.svg" style="width:22px;height:22px" onerror="this.style.display='none'">
            <img src="ai/icon/brand/deepseek-text.svg" style="height:16px;width:auto" onerror="this.style.display='none'">
          </div>
          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0">
            <img src="ai/icon/brand/zhipu-color.svg" style="width:22px;height:22px" onerror="this.style.display='none'">
            <img src="ai/icon/brand/zhipu-text.svg" style="height:16px;width:auto" onerror="this.style.display='none'">
          </div>
        </div>
        <div class="brand-box-model">
          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0;background:rgba(59,108,255,.06);width:100%;box-sizing:border-box">
            <img src="ai/icon/brand/doubao-color.svg" style="width:22px;height:22px" onerror="this.style.display='none'">
            <img src="ai/icon/brand/doubao-text.svg" style="height:16px;width:auto" onerror="this.style.display='none'">
          </div>
          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0;background:rgba(59,108,255,.06);width:100%;box-sizing:border-box">
            <img src="ai/icon/brand/qwen-color.svg" style="width:22px;height:22px" onerror="this.style.display='none'">
            <img src="ai/icon/brand/qwen-text.svg" style="height:16px;width:auto" onerror="this.style.display='none'">
          </div>
          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0;background:rgba(59,108,255,.06);width:100%;box-sizing:border-box">
            <img src="ai/icon/brand/kimi.svg" style="width:22px;height:22px" onerror="this.style.display='none'">
            <img src="ai/icon/brand/kimi-text.svg" style="height:16px;width:auto" onerror="this.style.display='none'">
          </div>
          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0;background:rgba(59,108,255,.06);width:100%;box-sizing:border-box">
            <img src="ai/icon/brand/deepseek-color.svg" style="width:22px;height:22px" onerror="this.style.display='none'">
            <img src="ai/icon/brand/deepseek-text.svg" style="height:16px;width:auto" onerror="this.style.display='none'">
          </div>
          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0;background:rgba(59,108,255,.06);width:100%;box-sizing:border-box">
            <img src="ai/icon/brand/chatglm-color.svg" style="width:22px;height:22px" onerror="this.style.display='none'">
            <img src="ai/icon/brand/chatglm-text.svg" style="height:16px;width:auto" onerror="this.style.display='none'">
          </div>
        </div>
      </div>
      <!-- 国外框 -->
      <div class="brand-box">
        <div class="brand-box-company">

            <img src="ai/icon/brand/openai.svg" style="width:22px;height:22px" onerror="this.style.display='none'">
            <img src="ai/icon/brand/openai-text.svg" style="height:16px;width:auto" onerror="this.style.display='none'">
          </div>
          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0">
            <img src="ai/icon/brand/google-brand-color.svg" style="height:22px;width:auto" onerror="this.style.display='none'">
          </div>
          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0">
            <img src="ai/icon/brand/anthropic.svg" style="width:22px;height:22px" onerror="this.style.display='none'">
            <img src="ai/icon/brand/anthropic-text.svg" style="height:16px;width:auto" onerror="this.style.display='none'">
          </div>
          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0">
            <img src="ai/icon/brand/xai.svg" style="width:22px;height:22px" onerror="this.style.display='none'">
            <img src="ai/icon/brand/xai-text.svg" style="height:16px;width:auto" onerror="this.style.display='none'">
          </div>
          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0">

          </div>
        </div>
        <div class="brand-box-model">
          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0;background:rgba(229,62,62,.06);width:100%;box-sizing:border-box">

          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0;background:rgba(229,62,62,.06);width:100%;box-sizing:border-box">
            <img src="ai/icon/brand/gemini-color.svg" style="width:22px;height:22px" onerror="this.style.display='none'">
            <img src="ai/icon/brand/gemini-text.svg" style="height:16px;width:auto" onerror="this.style.display='none'">
          </div>

            <img src="ai/icon/brand/claude-color.svg" style="width:22px;height:22px" onerror="this.style.display='none'">
            <img src="ai/icon/brand/claude-text.svg" style="height:16px;width:auto" onerror="this.style.display='none'">
          </div>
          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0;background:rgba(229,62,62,.06);width:100%;box-sizing:border-box">
            <img src="ai/icon/brand/grok.svg" style="width:22px;height:22px" onerror="this.style.display='none'">
            <img src="ai/icon/brand/grok-text.svg" style="height:16px;width:auto" onerror="this.style.display='none'">
          </div>
          <div class="tag" style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin:0;background:rgba(229,62,62,.06);width:100%;box-sizing:border-box">
            <img src="ai/icon/brand/flux.svg" style="width:22px;height:22px" onerror="this.style.display='none'">
            <img src="ai/icon/brand/flux-text.svg" style="height:16px;width:auto" onerror="this.style.display='none'">
          </div>
        </div>
      </div>
    </div>
    <div style="padding-top:0">
      <p style="font-size:14px;color:var(--accent-3);margin-bottom:8px">三阶段训练（点击展开）</p>
      <div class="ca-card" onclick="this.classList.toggle('open')" style="border-left:3px solid var(--good)"><div class="ch">① 预训练 <span class="ic">▼</span></div><div class="cb"><div class="cb-inner">把真实世界的所有文字资料都<b>喂</b>给它，让它学会人类语言逻辑，并据此<b>"猜词"</b></div></div></div>
      <div class="ca-card" onclick="this.classList.toggle('open')" style="border-left:3px solid var(--accent)"><div class="ch">② 指令微调 <span class="ic">▼</span></div><div class="cb"><div class="cb-inner">给AI大量<b>"问题→正确答案"</b>配对数据，让它学会回答问题</div></div></div>
      <div class="ca-card" onclick="this.classList.toggle('open')" style="border-left:3px solid var(--bad)"><div class="ch">③ RLHF <span class="ic">▼</span></div><div class="cb"><div class="cb-inner">人类给AI的回答<b>打分</b>，AI为拿高分过度优化，变成<b>"舔狗"</b></div></div></div>
      <div class="ca-card" onclick="this.classList.toggle('open')" style="border-left:3px solid var(--warn)"><div class="ch">⚠️ 局限 <span class="ic">▼</span></div><div class="cb"><div class="cb-inner">幻觉 / 知识截止 / 无真实理解</div></div></div>
    </div>
  </div>
  <div class="eco-bar"><div class="eco-row">
    <span class="pill" style="border-color:#685DF9;background:rgba(104,93,249,.08)"><img src="ai/icon/bytedance.svg" onerror="this.classList.add('err')"><span class="dot" style="background:#685DF9"></span>豆包</span>
    <span class="pill" style="border-color:#FF6A00;background:rgba(255,106,0,.08)"><img src="ai/icon/alibabacloud.svg" onerror="this.classList.add('err')"><span class="dot" style="background:#FF6A00"></span>千问</span>

    <span class="pill" style="border-color:#4D6BFE;background:rgba(77,107,254,.08)"><img src="ai/icon/deepseek.svg" onerror="this.classList.add('err')"><span class="dot" style="background:#4D6BFE"></span>DeepSeek</span>

    <span class="pill" style="border-color:#D97757;background:rgba(217,119,87,.08)"><img src="ai/icon/anthropic.svg" onerror="this.classList.add('err')"><span class="dot" style="background:#D97757"></span>Claude</span>
  </div></div>

</body>
</html>

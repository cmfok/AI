<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>监听 · AI 真垃圾</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:#0d1117;color:#e6edf3}
.app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}
.header{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.header h1{font-size:18px;font-weight:700;flex:1}
.status{font-size:11px;color:#8b949e;display:flex;gap:6px;align-items:center}
.status .dot{width:8px;height:8px;border-radius:50%}.dot-on{background:#f85149;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.dot-off{background:#484f58}
.controls{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.controls button{flex:1;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;touch-action:manipulation}
.btn-listen{background:rgba(255,45,85,.15);color:#ff2d55;border:1px solid rgba(255,45,85,.2)}
.btn-listen.active{background:#ff2d55;color:#fff}
.btn-send{background:rgba(100,149,237,.15);color:#6495ed;border:1px solid rgba(100,149,237,.2)}
.btn-send:disabled{opacity:.3;cursor:default}
.transcript{flex:1;overflow-y:auto;padding:12px 16px}
.msg{padding:10px 14px;border-radius:10px;margin-bottom:8px;font-size:14px;line-height:1.6}
.msg-user{background:rgba(100,149,237,.1);border:1px solid rgba(100,149,237,.15)}
.msg-system{background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.12)}
.msg-interim{background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.1);color:#8b949e}
.msg .t{font-size:11px;color:#6e7681;margin-bottom:2px}
.msg .tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;margin-top:4px;background:rgba(255,255,255,.06)}
.hint{text-align:center;padding:40px 20px;color:#484f58;font-size:14px;line-height:1.8}
.hint .big{font-size:48px;margin-bottom:12px}
.footer{padding:8px 16px;border-top:1px solid rgba(255,255,255,.06);text-align:center;font-size:11px;color:#484f58}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🎤 监听</h1>
    <div class="status"><span class="dot dot-off" id="rec-dot"></span><span id="rec-label">未监听</span></div>
  </div>
  <div class="controls">
    <button class="btn-listen" id="btn-listen">⏺ 开始监听</button>
    <button class="btn-send" id="btn-send" disabled>📤 发送</button>
  </div>
  <div class="transcript" id="transcript">
    <div class="hint">
      <div class="big">🎤</div>
      <p>点击「开始监听」后，说出问题</p>
      <p style="margin-top:12px;font-size:12px;color:#6e7681">说完点击「发送」传送到控制台</p>
    </div>
  </div>
  <div class="footer">监听 · AI 真垃圾</div>
</div>
<script>
let isListening=false,recognition=null,finalTranscript='';
function addMsg(type,text,extra){
  const el=document.getElementById('transcript');
  const hint=el.querySelector('.hint');if(hint)hint.remove();
  if(type==='interim'){
    const existing=el.querySelector('.msg-interim:last-child');
    if(existing){existing.innerHTML=`<div class="t">🔊 识别中</div>${esc(text)}`;return}
  }
  const div=document.createElement('div');div.className='msg msg-'+type;
  const label=type==='user'?'🎙 你':type==='system'?'🤖':'🔊';
  div.innerHTML=`<div class="t">${label}</div>${esc(text)}${extra||''}`;
  el.appendChild(div);el.scrollTop=el.scrollHeight;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

document.getElementById('btn-listen').onclick=()=>{
  const btn=document.getElementById('btn-listen'),dot=document.getElementById('rec-dot'),lb=document.getElementById('rec-label');
  if(!('webkitSpeechRecognition'in window)&&!('SpeechRecognition'in window)){addMsg('system','⚠ 浏览器不支持语音识别，请用Chrome');return}
  if(isListening){recognition&&recognition.stop();isListening=false;btn.textContent='⏺ 开始监听';btn.classList.remove('active');dot.className='dot dot-off';lb.textContent='未监听';return}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='zh-CN';recognition.continuous=true;recognition.interimResults=true;
  recognition.onstart=()=>{isListening=true;btn.textContent='⏹ 停止';btn.classList.add('active');dot.className='dot dot-on';lb.textContent='监听中';finalTranscript='';document.getElementById('btn-send').disabled=true;addMsg('system','🎤 已启动，请说话...')};
  recognition.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)final+=t;else interim+=t}
    if(final){finalTranscript+=final;addMsg('user',final,'');document.getElementById('btn-send').disabled=false;autoSend(final)}
    if(interim)addMsg('interim',interim,'')
  };
  recognition.onerror=(e)=>{console.error(e.error);if(e.error==='not-allowed')addMsg('system','⚠ 请允许麦克风权限')};
  recognition.onend=()=>{if(isListening){try{recognition.start()}catch(e){}}else addMsg('system','⏹ 已停止')};
  try{recognition.start()}catch(e){addMsg('system','⚠ 启动失败:'+e.message)}
};
async function autoSend(text){
  try{
    const r=await fetch('/api/listener/classify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    const d=await r.json();
    if(d.ok && d.type==='question'){
      if(d.entered_queue){
        addMsg('system','✅ 已自动提交到控制台 · '+(d.page?'P'+d.page+'页':'')+'');
        addMsg('system','📝 '+d.refined);
        finalTranscript='';document.getElementById('btn-send').disabled=true;
      } else if(d.not_relevant){
        addMsg('system','⏭ '+d.summary);
        finalTranscript='';document.getElementById('btn-send').disabled=true;
      } else {
        addMsg('system','ℹ️ '+d.summary);
      }
    } else if(d.not_question){
      addMsg('system','ℹ️ '+d.summary);
      finalTranscript='';document.getElementById('btn-send').disabled=true;
    } else {
      addMsg('system','❌ '+(d.error||'处理失败'))
    }
  }catch(e){
    addMsg('system','❌ 网络错误');
  }
}
document.getElementById('btn-send').onclick=async()=>{
  if(!finalTranscript)return;
  const btn=document.getElementById('btn-send');btn.disabled=true;btn.textContent='⏳...';
  try{
    const r=await fetch('/api/listener/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:finalTranscript})});
    const d=await r.json();
    if(d.ok){addMsg('system','✅ 已发送到控制台');btn.textContent='✅ 已发送';finalTranscript=''}
    else addMsg('system','❌ 发送失败')
  }catch(e){addMsg('system','❌ 网络错误');btn.disabled=false;btn.textContent='📤 发送'}
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>AI 真垃圾 · 分享会</title>
<style>
/* ═══════════════════ reset & base ═══════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:-apple-system,"SF Pro Display","Helvetica Neue","Noto Sans SC",sans-serif;
  background:#000;color:#f5f5f7;
}

/* ═══════════════════ slide 容器 ═══════════════════ */
#slideContainer{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;z-index:1;
  opacity:1;transition:opacity 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
}
#slideContainer.fading{opacity:0}
.slide-inner{
  position:absolute;top:0;left:0;right:0;bottom:0;
  padding:60px 48px 80px;
  display:flex;flex-direction:column;justify-content:center;
  overflow:hidden;
}
.slide-inner.max-w{max-width:1200px;margin:0 auto;left:auto;right:auto;padding:60px 40px 80px}

/* ── 页面指示器 ── */
#pageIndicator{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:20;
  font-size:13px;color:rgba(255,255,255,0.3);font-family:monospace;
  letter-spacing:2px;padding:6px 16px;
  background:rgba(0,0,0,0.6);border-radius:8px;
  backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.06);
}
#pageIndicator .current{color:#f5f5f7;font-weight:600}

/* ── 全黑过渡遮罩 ── */
#fadeOverlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:10;
  background:#000;
  opacity:0;pointer-events:none;
  transition:opacity 0.3s ease;
}
#fadeOverlay.show{opacity:1;pointer-events:auto}

/* ═══════════════════ Q&A 面板 ═══════════════════ */
/* ── 桌面端：右侧固定面板 ── */
#qaPanel{
  position:fixed;top:0;right:0;bottom:0;z-index:5;
  width:340px;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);
  border-left:1px solid rgba(255,255,255,0.06);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
}
#qaPanel.open{transform:translateX(0)}
#qaPanel .header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06);
}
#qaPanel .header h3{font-size:15px;font-weight:600}
#qaPanel .header h3 span{color:#64b5f6}
#qaPanel .header .close-btn{
  background:none;border:none;color:rgba(255,255,255,0.3);
  font-size:18px;cursor:pointer;padding:4px;
}
#qaList{flex:1;overflow-y:auto;padding:12px 16px}
.qa-item{
  background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);
  border-radius:10px;padding:14px;margin-bottom:10px;
}
.qa-item .q{font-size:13px;line-height:1.5;color:#d4d4d4;margin-bottom:6px}
.qa-item .q::before{content:'💬 ';font-size:12px}
.qa-item .a{
  font-size:13px;line-height:1.6;color:#64b5f6;
  padding-left:20px;border-left:2px solid rgba(0,113,227,0.3);
}
.qa-item .a::before{content:'AI · ';color:rgba(100,181,246,0.5);font-size:11px}
.qa-item .tag{
  display:inline-block;margin-top:6px;padding:2px 8px;border-radius:4px;
  background:rgba(0,113,227,0.1);color:#64b5f6;font-size:11px;
}

/* ── Q&A 切换按钮 ── */
#qaToggle{
  position:fixed;top:50%;right:0;z-index:6;transform:translateY(-50%);
  width:36px;height:50px;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.06);border-right:none;
  border-radius:8px 0 0 8px;cursor:pointer;
  color:rgba(255,255,255,0.5);font-size:14px;transition:all 0.3s;
  display:flex;align-items:center;justify-content:center;
}
#qaToggle:hover{color:#64b5f6;width:40px}
#qaToggle .count{
  position:absolute;top:-6px;right:-6px;
  width:18px;height:18px;border-radius:50%;
  background:#ff6b35;color:#fff;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  display:none;
}
#qaToggle .count.show{display:flex}

/* ── 手机端：底部半屏抽屉 ── */
#qaMobile{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:15;
  background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.06);
  border-radius:16px 16px 0 0;
  transform:translateY(calc(100% - 44px));transition:transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
}
#qaMobile.open{transform:translateY(0)}
#qaMobile .handle{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;cursor:pointer;user-select:none;
}
#qaMobile .handle .bar{width:32px;height:3px;border-radius:2px;background:rgba(255,255,255,0.2);margin:0 auto}
#qaMobile .handle .title{font-size:13px;color:#86868b}
#qaMobile .handle .title span{color:#64b5f6}
#qaMobile .qa-mobile-content{padding:0 16px 16px;max-height:50vh;overflow-y:auto}

/* ═══════════════════ 自定义滚动条 ═══════════════════ */
#qaList::-webkit-scrollbar,.qa-mobile-content::-webkit-scrollbar{width:3px}
#qaList::-webkit-scrollbar-thumb,.qa-mobile-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* ═══════════════════ 响应式 ═══════════════════ */
@media(max-width:768px){
  #qaPanel{display:none}
  #qaToggle{display:none}
  #qaMobile{display:block}
  .slide-inner{padding:50px 20px 70px}
}
@media(min-width:769px){
  #qaMobile{display:none}
  .slide-inner{padding:60px 48px 80px}
}
</style>

// 渐变过渡：渐隐到全黑 → 切换 → 渐亮
// ═══════════════════════════════════════════════════════
function goToSlide(index) {
  if (isTransitioning || index === currentSlide) return;
  if (index < 0 || index >= SLIDES.length) return;
  
  isTransitioning = true;
  currentSlide = index;
  
  fadeOverlay.classList.add('show');   // → 350ms 渐隐到全黑
  
  setTimeout(() => {
    renderSlide(index);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        fadeOverlay.classList.remove('show');  // → 300ms 渐亮
        isTransitioning = false;
      });
    });
  }, 350);
}

// 轮询控制台
// ═══════════════════════════════════════════════════════
async function pollControl() {
  try {
    const r = await fetch('/api/control/current');
    const d = await r.json();
    const target = d.slide - 1;
    if (target >= 0 && target < SLIDES.length && target !== currentSlide) {
      goToSlide(target);
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════
// Q&A 问答
// ═══════════════════════════════════════════════════════
let qaItems = [];

async function pollQa() {
  try {
    const r = await fetch('/api/control/qa-overlay');
    const d = await r.json();
    if (d.question && d.answer && d.slide) {
      const exists = qaItems.some(item => item.question === d.question);
      if (!exists) {
        qaItems.push({ question: d.question, answer: d.answer, slide: d.slide });
        updateQaDisplay();
      }
    }
  } catch(e) {}
}

async function pollQuestions() {
  try {
    const r = await fetch('/api/questions');
    const allQ = await r.json();
    if (Array.isArray(allQ)) {
      for (const q of allQ) {
        if (q.answer && q.answer.trim() && q.refined) {
          const exists = qaItems.some(item => item.question === (q.refined || q.question));
          if (!exists) {
            qaItems.push({
              question: q.refined || q.question,
              answer: q.answer,
              slide: q.page || '?',
              tag: q.type === 'share' ? '场景分享' : '提问'
            });
          }
        }
      }
      updateQaDisplay();
    }
  } catch(e) {}
}

function updateQaDisplay() {
  const count = qaItems.length;
  document.getElementById('qaPanelCount').textContent = count;
  document.getElementById('qaMobileCount').textContent = count;
  const badge = document.getElementById('qaBadge');
  badge.textContent = count;
  badge.classList.toggle('show', count > 0);
  
  const renderItem = item => `
    <div class="qa-item">
      <div class="q">${item.question}</div>
      <div class="a">${item.answer}</div>
      ${item.tag ? `<div class="tag">${item.tag}</div>` : ''}
    </div>`;
  
  document.getElementById('qaList').innerHTML = qaItems.map(renderItem).join('');
  document.getElementById('qaMobileList').innerHTML = qaItems.map(renderItem).join('');
}

function toggleQa() {
  document.getElementById('qaPanel').classList.toggle('open');
}

function toggleMobileQa() {
  document.getElementById('qaMobile').classList.toggle('open');
}

    goToSlide(currentSlide + 1);
  }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    goToSlide(currentSlide - 1);
  }
});

// ═══════════════════════════════════════════════════════
// URL 参数跳转 & 初始化
// ═══════════════════════════════════════════════════════
const urlParams = new URLSearchParams(window.location.search);
const startSlide = parseInt(urlParams.get('go')) || 1;

document.addEventListener('DOMContentLoaded', () => {
  renderSlide(startSlide - 1);
  currentSlide = startSlide - 1;
  setInterval(pollControl, 1000);
  setInterval(pollQa, 2000);
  setInterval(pollQuestions, 5000);
});
</script>

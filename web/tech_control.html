<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>演讲控制台 · AI真垃圾</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,"SF Pro Display","Helvetica Neue","Noto Sans SC",sans-serif;
  background:#000;color:#f5f5f7;padding:16px;overflow-x:hidden;
}
.container{max-width:800px;margin:0 auto}
.nav-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;margin-bottom:16px;
}
.nav-bar .page-info{font-size:13px;color:#86868b;display:flex;align-items:center;gap:8px}
.nav-bar .page-info strong{color:#f5f5f7;font-size:18px}
.nav-btns{display:flex;gap:8px}
.nav-btn{
  padding:10px 20px;border-radius:12px;border:none;
  font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.nav-btn.prev{background:rgba(255,255,255,0.06);color:#f5f5f7}
.nav-btn.prev:active{background:rgba(255,255,255,0.12)}
.nav-btn.next{background:#0071e3;color:#fff}
.nav-btn.next:active{background:#0077ed}
.nav-btn:disabled{opacity:0.3;pointer-events:none}
.page-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));
  gap:6px;margin-bottom:16px;
}
.page-dot{
  padding:8px 0;border-radius:8px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.02);
  font-size:11px;color:#86868b;text-align:center;cursor:pointer;
  transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.page-dot.active{background:#0071e3;border-color:#0071e3;color:#fff}
.page-dot:active{transform:scale(0.95)}
.tabs{display:flex;gap:8px;margin-bottom:12px}
.tab{
  padding:8px 16px;border-radius:8px;border:none;
  font-size:13px;font-weight:500;cursor:pointer;
  background:rgba(255,255,255,0.04);color:#86868b;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.tab.active{background:rgba(0,113,227,0.15);color:#64b5f6}
.tab .count{
  display:inline-block;margin-left:4px;padding:0 6px;
  border-radius:6px;background:rgba(255,255,255,0.08);font-size:11px;
}
.panel{display:none}
.panel.active{display:block}
.script-card{
  background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;padding:16px;
  max-height:50vh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.script-card .page-label{
  font-size:11px;color:rgba(255,255,255,0.3);font-family:monospace;
  margin-bottom:8px;letter-spacing:0.5px;
}
.script-card .content{font-size:14px;line-height:1.7;color:#d4d4d4;white-space:pre-wrap}
.script-card .content strong{color:#f5f5f7}
.question-list{list-style:none}
.question-item{
  background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);
  border-radius:10px;padding:14px;margin-bottom:8px;
}
.question-item .q-text{font-size:14px;line-height:1.5;margin-bottom:4px}
.question-item .q-meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#86868b}
.question-item .q-deeper{
  margin-top:8px;padding:8px 10px;border-radius:6px;
  background:rgba(0,113,227,0.08);font-size:13px;color:#64b5f6;line-height:1.5;
}
.question-item .q-page{display:inline-block;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,0.06);font-size:11px}
.empty-state{padding:24px;text-align:center;color:#86868b;font-size:14px}
.pending-item{
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
  border-radius:8px;padding:10px 12px;margin-bottom:6px;
}
.pending-item .pending-text{font-size:14px;line-height:1.5;margin-bottom:6px}
.pending-item .pending-meta{display:flex;justify-content:space-between;align-items:center;gap:8px}
.pending-item .pending-time{font-size:11px;color:#666}
.pending-item .pending-answer{
  padding:4px 12px;border-radius:6px;border:none;
  background:#0071e3;color:#fff;font-size:12px;font-weight:600;cursor:pointer;
}
.pending-item .pending-answer:active{background:#0077ed}
.pending-item .pending-skip{
  padding:4px 8px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);
  background:transparent;color:#666;font-size:12px;cursor:pointer;
}
.qa-trigger{
  display:flex;align-items:center;gap:12px;
  padding:16px;margin-bottom:12px;
  background:rgba(0,113,227,0.08);border:1px solid rgba(0,113,227,0.15);
  border-radius:14px;
}
.mic-btn{
  width:56px;height:56px;border-radius:50%;border:none;
  background:#0071e3;color:#fff;font-size:24px;cursor:pointer;
  transition:all 0.3s;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.mic-btn:active{transform:scale(0.9)}
.mic-btn.listening{background:#f44336;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(244,67,54,0.4)}50%{box-shadow:0 0 0 12px rgba(244,67,54,0)}}
.mic-btn:disabled{opacity:0.4;pointer-events:none}
.qa-status{font-size:13px;color:#86868b;line-height:1.4;flex:1}
.qa-status .transcript{color:#f5f5f7;font-size:15px}
.qa-answer{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px;margin-top:8px;display:none}
.qa-answer.show{display:block}
.qa-answer .qa-q{font-size:14px;font-weight:600;color:#f5f5f7;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.06)}
.qa-answer .qa-a{font-size:13px;line-height:1.7;color:#d4d4d4;white-space:pre-wrap}
.qa-answer .qa-a strong{color:#f5f5f7}
.qa-answer .qa-slide{display:inline-block;margin-top:8px;padding:4px 10px;border-radius:6px;background:rgba(0,113,227,0.1);color:#64b5f6;font-size:12px}
.qa-answer .qa-sent{margin-top:8px;text-align:right;font-size:11px;color:#4caf50}
.qa-text-input{display:flex;gap:8px;margin-top:8px}
.qa-text-input input{
  flex:1;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);color:#f5f5f7;font-size:14px;outline:none;transition:border 0.2s;
}
.qa-text-input input:focus{border-color:#0071e3}
.qa-text-input input::placeholder{color:#86868b}
.qa-text-input button{
  padding:10px 16px;border-radius:10px;border:none;
  background:#0071e3;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;
}
.qa-text-input button:active{background:#0077ed}
.qa-divider{text-align:center;font-size:11px;color:rgba(255,255,255,0.2);padding:4px 0;margin:4px 0}
/* ── 演讲稿中的代码和 markdown ── */
.script-card .content code{
  display:inline-block;padding:1px 6px;border-radius:4px;
  background:rgba(255,255,255,0.06);font-family:monospace;font-size:13px;
  color:#64b5f6;
}
.sync-bar{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:12px;padding:8px 12px;background:rgba(255,255,255,0.02);border-radius:8px;
  font-size:11px;color:#86868b;
}
.sync-bar .status{display:flex;align-items:center;gap:6px}
.sync-bar .dot{width:6px;height:6px;border-radius:50%;background:#4caf50}
.sync-bar .dot.error{background:#f44336}
@media(max-width:480px){
  body{padding:10px}
  .nav-bar{flex-direction:column;gap:10px}
  .nav-btns{width:100%}
  .nav-btn{flex:1;text-align:center;padding:12px}
  .page-grid{grid-template-columns:repeat(auto-fill,minmax(36px,1fr))}
  .page-dot{padding:6px 0;font-size:10px}
}
</style>
</head>
<body>
<div class="container">

  <!-- 导航 -->
  <div class="nav-bar">
    <div class="page-info">
      当前页: <strong id="currentPage">1</strong> / <span id="totalPages">19</span>
    </div>
    <div class="nav-btns">
      <button class="nav-btn prev" id="btnPrev">← 上一页</button>
      <button class="nav-btn next" id="btnNext">下一页 →</button>
    </div>
  </div>

  <!-- 页面快速跳转 -->
  <div class="page-grid" id="pageGrid"></div>

  <!-- Tab 切换 -->
  <div class="tabs">
    <button class="tab active" data-tab="script">📝 演讲稿</button>
    <button class="tab" data-tab="questions">💬 观众问题 <span class="count" id="qCount">0</span></button>
    <button class="tab" data-tab="qa">🎤 AI 问答</button>
  </div>

  <!-- 演讲稿面板 -->
  <div class="panel active" id="panelScript">
    <div class="script-card" id="scriptContent">
      <div class="page-label" id="scriptLabel">P1 · 封面</div>
      <div class="content" id="scriptBody">加载中...</div>
    </div>
  </div>

  <!-- 观众问题面板 -->
  <div class="panel" id="panelQuestions">
    <div style="margin-bottom:12px;padding:12px 14px;background:rgba(0,113,227,0.05);border:1px solid rgba(0,113,227,0.12);border-radius:10px;">
      <div style="font-size:12px;color:#64b5f6;font-weight:600;margin-bottom:8px">🎤 待处理提问 <span class="count" id="pendingCount">0</span></div>
      <div id="pendingList"><div style="font-size:12px;color:#666;text-align:center;padding:8px">暂无待处理提问</div></div>
    </div>
    <div id="questionList"><div class="empty-state">暂无扫码问题</div></div>
  </div>

  <!-- AI 问答面板 -->
  <div class="panel" id="panelQa">
    <div class="qa-trigger">
      <button class="mic-btn" id="micBtn">🎤</button>
      <div class="qa-status" id="qaStatus">
        点击麦克风，说出观众的问题<br>
        <span class="transcript" id="qaTranscript"></span>
      </div>
    </div>
    <div class="qa-divider">— 或者 —</div>
    <div class="qa-text-input">
      <input type="text" id="qaTextInput" placeholder="输入观众的问题..." />
      <button id="qaTextBtn">提问</button>
    </div>
    <div class="qa-answer" id="qaAnswer">
      <div class="qa-q" id="qaQuestion"></div>
      <div class="qa-a" id="qaAnswerText"></div>
      <div class="qa-slide" id="qaSlide">定位中...</div>
      <div class="qa-sent" id="qaSent">✅ 已发送到展示页</div>
    </div>
  </div>

  <!-- 同步状态 -->
  <div class="sync-bar">
    <div class="status"><span class="dot" id="syncDot"></span><span id="syncText">已连接</span></div>
    <span id="syncTime"></span>
  </div>
</div>

<script>
const TOTAL_SLIDES = 19;
let currentSlide = 1;
let scriptData = {};

document.addEventListener('DOMContentLoaded',()=>{
  const grid=document.getElementById('pageGrid');
  for(let i=1;i<=TOTAL_SLIDES;i++){
    const dot=document.createElement('div');
    dot.className='page-dot'+(i===1?' active':'');
    dot.textContent='P'+i;
    dot.dataset.page=i;
    dot.addEventListener('click',()=>goToPage(i));
    grid.appendChild(dot);
  }
  document.getElementById('totalPages').textContent=TOTAL_SLIDES;
  loadScript();
  loadQuestions();
  loadCurrentSlide();
  setInterval(loadCurrentSlide,2000);
  setInterval(loadQuestions,5000);
  setInterval(loadPending,3000);
  loadPending();
});

async function goToPage(n){
  if(n<1||n>TOTAL_SLIDES)return;
  currentSlide=n;
  try{
    await fetch('/api/control/go',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({slide:n})
    });
  }catch(e){}
  updateUI();
  showScript(n);
}

document.getElementById('btnPrev').addEventListener('click',()=>goToPage(currentSlide-1));
document.getElementById('btnNext').addEventListener('click',()=>goToPage(currentSlide+1));

async function loadCurrentSlide(){
  try{
    const r=await fetch('/api/control/current');
    const d=await r.json();
    if(d.slide&&d.slide!==currentSlide){
      currentSlide=d.slide;
      updateUI();
      showScript(currentSlide);
    }
    document.getElementById('syncDot').className='dot';
    document.getElementById('syncText').textContent='已同步';
  }catch(e){
    document.getElementById('syncDot').className='dot error';
    document.getElementById('syncText').textContent='连接中...';
  }
}

async function loadScript(){
  try{
    scriptData = SCRIPT_DATA;
    showScript(currentSlide);
  }catch(e){}
}

function showScript(page){
  const label=document.getElementById('scriptLabel');
  const body=document.getElementById('scriptBody');
  const txt=scriptData[String(page)];
  if(txt){
    label.textContent='P'+page+' · '+getPageTitle(page);
    body.innerHTML=mdToHtml(txt);
  }else{
    label.textContent='P'+page;
    body.textContent='（暂无讲稿）';
  }
}

function mdToHtml(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>');
}

function getPageTitle(p){
  const titles={
    1:'封面',2:'外星人的语言',3:'训练三阶段/RLHF',
    4:'核心能力&局限',5:'Token概念&费用',6:'模型对比',
    7:'语音→PPT案例',8:'提示词工程',9:'约会翻车案例',
    10:'上下文工程',11:'知识库搭建',12:'运费对账+招聘案例',
    13:'规训工程',14:'生日营销案例',15:'循环工程',
    16:'个人vs企业AI',17:'数据隐私',18:'落地Checklist',
    19:'互动答疑'
  };
  return titles[p]||'';
}

// ── 待处理提问 ──
let pendingId=0;
async function loadPending(){
  try{
    const r=await fetch('/api/listener/pending');
    const d=await r.json();
    const pending=d.pending||[];
    const container=document.getElementById('pendingList');
    const count=document.getElementById('pendingCount');
    if(!pending.length){
      container.innerHTML='<div style="font-size:12px;color:#666;text-align:center;padding:8px">暂无待处理提问</div>';
      if(count)count.textContent='0';
      return;
    }
    if(count)count.textContent=pending.length;
    let html='';
    pending.forEach(q=>{
      html+='<div class="pending-item" id="pi_'+q.id+'">'+
        '<div class="pending-text">'+escapeHtml(q.text)+'</div>'+
        '<div class="pending-meta">'+
          '<span class="pending-time">'+q.time+'</span>'+
          '<button class="pending-answer" onclick="answerPending('+q.id+')">🤖 回答</button>'+
          '<button class="pending-skip" onclick="skipPending('+q.id+')">✕</button>'+
        '</div>'+
      '</div>';
    });
    container.innerHTML=html;
  }catch(e){}
}

async function answerPending(id){
  const btn=document.querySelector('#pi_'+id+' .pending-answer');
  if(btn)btn.textContent='⏳...';
  try{
    const r=await fetch('/api/listener/answer',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id})
    });
    const d=await r.json();
    if(d.ok&&d.match){
      await fetch('/api/control/go',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slide:d.match.slide})});
      await fetch('/api/control/qa-show',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:d.match.question,answer:d.match.answer,slide:d.match.slide})});
    }else if(d.ok&&d.fallback){
      await fetch('/api/control/go',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slide:d.slide})});
    }
    setTimeout(loadPending,500);
  }catch(e){}
}

async function skipPending(id){
  await fetch('/api/listener/clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
  loadPending();
}

// ── 加载观众问题 ──
async function loadQuestions(){
  try{
    const r=await fetch('/api/questions');
    const d=await r.json();
    const list=document.getElementById('questionList');
    const count=document.getElementById('qCount');
    if(!d.questions||d.questions.length===0){
      list.innerHTML='<div class="empty-state">暂无问题</div>';
      count.textContent='0';
      return;
    }
    count.textContent=d.questions.length;
    const currentQ=d.questions.filter(q=>q.page===currentSlide);
    const otherQ=d.questions.filter(q=>q.page!==currentSlide);
    let html='';
    if(currentQ.length){
      html+='<div style="font-size:11px;color:#0071e3;margin-bottom:6px;font-weight:600">当前页提问</div>';
      currentQ.forEach(q=>{html+=renderQuestion(q);});
    }
    if(otherQ.length){
      html+='<div style="font-size:11px;color:#86868b;margin:10px 0 6px;font-weight:600">其他页提问</div>';
      otherQ.slice(0,5).forEach(q=>{html+=renderQuestion(q);});
      if(otherQ.length>5)html+='<div style="text-align:center;font-size:12px;color:#86868b;padding:8px">还有 '+ (otherQ.length-5) +' 条...</div>';
    }
    list.innerHTML=html;
  }catch(e){}
}

function renderQuestion(q){
  const pageStr=q.page?'<span class="q-page">P'+q.page+'</span>':'';
  const deeper=q.deeper?'<div class="q-deeper">💡 '+q.deeper+'</div>':'';
  const refined=q.refined?'<div style="font-size:12px;color:#86868b;margin-top:4px">🎯 '+q.refined+'</div>':'';
  return '<div class="question-item">'+
    '<div class="q-text">'+escapeHtml(q.question)+'</div>'+
    refined+deeper+
    '<div class="q-meta">'+pageStr+'<span>'+q.time+'</span></div>'+
  '</div>';
}

function escapeHtml(s){
  const d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

function updateUI(){
  document.getElementById('currentPage').textContent=currentSlide;
  document.getElementById('btnPrev').disabled=currentSlide<=1;
  document.getElementById('btnNext').disabled=currentSlide>=TOTAL_SLIDES;
  document.querySelectorAll('.page-dot').forEach((d,i)=>{
    d.classList.toggle('active',i+1===currentSlide);
  });
}

// ── Tab切换 ──
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    const map={script:'Script',questions:'Questions',qa:'Qa'};
    document.getElementById('panel'+map[tab.dataset.tab]).classList.add('active');
  });
});

// ── 语音问答 ──
const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
let recognition=null;
let isListening=false;

const micBtn=document.getElementById('micBtn');
const qaStatus=document.getElementById('qaStatus');
const qaAnswer=document.getElementById('qaAnswer');
const qaQuestion=document.getElementById('qaQuestion');
const qaAnswerText=document.getElementById('qaAnswerText');
const qaSlide=document.getElementById('qaSlide');
const qaSent=document.getElementById('qaSent');

if(!SpeechRecognition){
  micBtn.disabled=true;
  qaStatus.innerHTML='当前浏览器不支持语音识别<br><span style="font-size:12px;color:#86868b">请用下方输入框输入问题</span>';
}else{
  recognition=new SpeechRecognition();
  recognition.lang='zh-CN';
  recognition.continuous=false;
  recognition.interimResults=true;

  micBtn.addEventListener('click',()=>{
    if(isListening){recognition.stop();return;}
    startListening();
  });
}

function startListening(){
  isListening=true;
  micBtn.classList.add('listening');
  micBtn.textContent='🔴';
  qaStatus.innerHTML='正在听...<br><span class="transcript" id="qaTranscript"></span>';
  qaAnswer.classList.remove('show');
  try{recognition.start()}catch(e){}
}

recognition.onresult=function(e){
  let final='',interim='';
  for(let i=e.resultIndex;i<e.results.length;i++){
    if(e.results[i].isFinal)final+=e.results[i][0].transcript;
    else interim+=e.results[i][0].transcript;
  }
  const display=final||interim;
  document.getElementById('qaTranscript').textContent=display;
  if(final)askQA(final);
};

recognition.onend=function(){
  isListening=false;
  micBtn.classList.remove('listening');
  micBtn.textContent='🎤';
  if(!document.getElementById('qaTranscript').textContent){
    qaStatus.innerHTML='点击麦克风，说出观众的问题';
  }
};

async function askQA(text){
  qaStatus.innerHTML='🤔 思考中...<br><span style="font-size:12px;color:#86868b">正在匹配最佳答案</span>';
  try{
    const r=await fetch('/api/qa/ask',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text})
    });
    const d=await r.json();
    if(d.ok&&d.match){
      await fetch('/api/control/go',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slide:d.match.slide})});
      await fetch('/api/control/qa-show',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:d.match.question,answer:d.match.answer,slide:d.match.slide})});
      qaQuestion.textContent='💬 '+d.match.question;
      qaAnswerText.textContent=d.match.answer;
      qaSlide.textContent='📄 已翻到 P'+d.match.slide;
      qaSent.style.display='block';
      qaAnswer.classList.add('show');
      qaStatus.innerHTML='🎯 已匹配到答案<br><span style="font-size:12px;color:#4caf50">匹配度: '+(d.score*100)+'%</span>';
    }else{
      qaStatus.innerHTML='😅 '+d.error+'<br><span style="font-size:12px;color:#86868b">'+d.hint+'</span>';
    }
  }catch(e){
    qaStatus.innerHTML='❌ 网络错误，请重试';
  }
}

// 自动切到Q&A tab
micBtn.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelector('[data-tab="qa"]').classList.add('active');
  document.getElementById('panelQa').classList.add('active');
});

// 文字输入兜底
document.getElementById('qaTextBtn').addEventListener('click',submitTextQuestion);
document.getElementById('qaTextInput').addEventListener('keydown',(e)=>{
  if(e.key==='Enter')submitTextQuestion();
});
function submitTextQuestion(){
  const input=document.getElementById('qaTextInput');
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelector('[data-tab="qa"]').classList.add('active');
  document.getElementById('panelQa').classList.add('active');
  askQA(text);
}

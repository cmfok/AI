// ══════════════════════════════════════════════════════════════
// 渲染 & 导航
// ══════════════════════════════════════════════════════════════
let cur=0,transitioning=false,pageLocked=false;
const stage=document.getElementById('stage'),fade=document.getElementById('fade');

function render(i){
  const s=S[i];if(!s)return;
  const div=document.createElement('div');
  div.className='slide active '+(s.cls||'dark');
  div.innerHTML=s.html;
  stage.innerHTML='';stage.appendChild(div);
  document.getElementById('pgCur').textContent=i+1;
  document.getElementById('pgTotal').textContent=S.length;
}

function go(i){
  if(transitioning||pageLocked||i===cur||i<0||i>=S.length)return;
  transitioning=true;cur=i;
  fade.classList.add('show');
  setTimeout(()=>{
    render(i);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      fade.classList.remove('show');transitioning=false;
    }));
  },300);
}

// ── 键盘 ──
document.addEventListener('keydown',e=>{
  if(pageLocked)return;
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(cur+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();go(cur-1);}
  if(e.key==='f'||e.key==='F'){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();}
});

// ── 触摸滑动（改进：降低阈值 + 阻止纵向滚动干扰）──
let tx=0,ty=0,swiping=false;
document.addEventListener('touchstart',e=>{
  tx=e.touches[0].clientX;ty=e.touches[0].clientY;swiping=false;
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(pageLocked)return;
  const dx=Math.abs(e.touches[0].clientX-tx),dy=Math.abs(e.touches[0].clientY-ty);
  if(dx>dy&&dx>20){e.preventDefault();swiping=true;}
},{passive:false});
document.addEventListener('touchend',e=>{
  if(pageLocked||!swiping)return;
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>30)go(dx<0?cur+1:cur-1);
},{passive:true});

// ── 鼠标滚轮 ──
let wheelCool=false;
document.addEventListener('wheel',e=>{
  if(pageLocked)return;
  if(wheelCool)return;wheelCool=true;setTimeout(()=>wheelCool=false,1200);
  go(e.deltaY>0?cur+1:cur-1);
},{passive:true});

// ══════════════════════════════════════════════════════════════
// BroadcastChannel 控制台通信
// ══════════════════════════════════════════════════════════════
let bc;
try{bc=new BroadcastChannel('ai3-control');}catch(e){}
if(bc){
  bc.onmessage=e=>{
    const d=e.data;
    if(d.type==='goto')go(d.slide-1);
    if(d.type==='expand'){
      const el=document.getElementById(d.id);if(!el)return;
      if(d.id==='modal10'){el.style.display=d.open?'flex':'none';return;}
      el.classList.toggle('open',d.open);
    }
    if(d.type==='tlc'){
      const prefix=d.id;
      for(let i=1;i<=3;i++){const el=document.getElementById(prefix+String.fromCharCode(96+i));if(el)el.classList.toggle('active',i===d.level);}
    }
    if(d.type==='lock'){pageLocked=!!d.locked;}
  };
  setInterval(()=>{try{bc.postMessage({type:'current',slide:cur+1});}catch(e){}},1000);
}

// ── 初始渲染 ──
const start=parseInt(new URLSearchParams(location.search).get('go'))||1;
cur=start-1;render(cur);
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>语音监听 · AI 真垃圾</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a12;--card:rgba(255,255,255,.05);--border:rgba(255,255,255,.08);
  --text:#f5f5f7;--dim:rgba(245,245,247,.52);--accent:#ff5a36;--green:#2e9d5e;
  --red:#e53e3e;--orange:#e87722;
  --grad:linear-gradient(120deg,#ff5a36 0%,#ff8c5a 60%,#ffb36b 100%);
  --radius:14px;
  --sans:'Inter','Noto Sans SC',-apple-system,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
/* ── 状态指示 ── */
.status-bar{position:fixed;top:0;left:0;right:0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;background:var(--bg);border-bottom:1px solid var(--border);z-index:10;font-size:13px;color:var(--dim)}
.status-bar .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px}
.status-bar .dot.offline{background:var(--red)}
/* ── 主区域 ── */
.main{text-align:center;max-width:600px;width:100%}
.mic-ring{
  width:160px;height:160px;border-radius:50%;
  border:3px solid var(--border);background:rgba(255,255,255,.03);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;cursor:pointer;transition:all .3s;
  -webkit-tap-highlight-color:transparent;
}
.mic-ring:hover{border-color:var(--accent);background:rgba(255,90,54,.05)}
.mic-ring.listening{
  border-color:var(--red);background:rgba(229,62,62,.08);
  animation:pulse-ring 1.5s infinite;
}
.mic-ring:active{transform:scale(.95)}
.mic-icon{font-size:48px;transition:transform .3s}
.mic-ring.listening .mic-icon{animation:pulse-icon 1s infinite}
@keyframes pulse-ring{0%,100%{box-shadow:0 0 0 0 rgba(229,62,62,.3)}50%{box-shadow:0 0 0 20px rgba(229,62,62,0)}}
@keyframes pulse-icon{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
/* ── 标签 ── */
.label{font-size:14px;color:var(--dim);margin-bottom:8px}
.hint{font-size:12px;color:rgba(255,255,255,.25);margin-top:8px}
/* ── 转写区域 ── */
.transcript-box{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:16px;margin-top:20px;min-height:80px;text-align:left;
}
.transcript-box .t-label{font-size:11px;color:var(--dim);font-family:var(--mono);margin-bottom:8px;letter-spacing:.5px}
.transcript-box .t-text{font-size:18px;line-height:1.6;color:var(--text);min-height:40px}
.transcript-box .t-text.placeholder{color:rgba(255,255,255,.2);font-style:italic}
.transcript-box .t-text .interim{color:var(--dim);opacity:.6}
/* ── 问答结果 ── */
.qa-result{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:16px;margin-top:12px;display:none;text-align:left;
}
.qa-result.show{display:block}
.qa-result .q-label{font-size:11px;color:var(--orange);font-family:var(--mono);margin-bottom:6px}
.qa-result .q-text{font-size:14px;color:var(--text);margin-bottom:10px;line-height:1.6}
.qa-result .a-label{font-size:11px;color:var(--green);font-family:var(--mono);margin-bottom:6px}
.qa-result .a-text{font-size:14px;color:var(--dim);line-height:1.7}
.qa-result .a-text strong{color:var(--text)}
.qa-result .a-slide{display:inline-block;margin-top:10px;padding:4px 10px;border-radius:6px;background:rgba(255,90,54,.1);color:#ffb36b;font-size:12px;cursor:pointer}
/* ── 历史记录 ── */
.history{margin-top:16px;text-align:left}
.history .h-title{font-size:12px;color:var(--dim);margin-bottom:8px}
.history-item{
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);
  border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:13px;
}
.history-item .hi-q{color:var(--text);margin-bottom:4px}
.history-item .hi-a{color:var(--dim);font-size:12px;line-height:1.5}
/* ── 不支持提示 ── */
.not-supported{
  background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.2);
  border-radius:12px;padding:20px;text-align:center;color:var(--dim);
  font-size:14px;line-height:1.7;
}
.not-supported strong{color:var(--red)}
</style>
</head>
<body>
<!-- 顶部状态 -->
<div class="status-bar">
  <div><span class="dot" id="syncDot"></span><span id="syncText">连接中…</span></div>
  <div id="pageTitle">🎙 语音监听</div>
</div>

<!-- 主区域 -->
<div class="main">
  <div class="label">点击麦克风开始语音识别</div>
  <div class="mic-ring" id="micRing">
    <div class="mic-icon">🎤</div>
  </div>
  <div class="hint" id="micHint">点击开始监听</div>

  <!-- 转写区域 -->
  <div class="transcript-box">
    <div class="t-label">SPEECH TRANSCRIPT · 语音转写</div>
    <div class="t-text placeholder" id="transcript">等待语音输入…</div>
  </div>

  <!-- 问答结果 -->
  <div class="qa-result" id="qaResult">
    <div class="q-label">❓ 识别到的问题</div>
    <div class="q-text" id="qaQ"></div>
    <div class="a-label">💡 建议回答</div>
    <div class="a-text" id="qaA"></div>
    <div class="a-slide" id="qaSlide">跳转到相关页面</div>
  </div>

  <!-- 历史记录 -->
  <div class="history" id="historyBox" style="display:none">
    <div class="h-title">📜 本次会话记录</div>
    <div id="historyList"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// 配置
// ══════════════════════════════════════════════════════════════
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;
let manuallyStopped = false; // 区分手动停止和自动结束
let history = [];

// ══════════════════════════════════════════════════════════════
// BroadcastChannel 通信
// ══════════════════════════════════════════════════════════════
let bc;
try { bc = new BroadcastChannel('ai3-control'); } catch(e) {}
let connected = false;

if (bc) {
  bc.onmessage = e => {
    const d = e.data;
    if (d.type === 'current') {
      connected = true;
      updateSync(true);
    }
    if (d.type === 'listen-start') {
      startListening();
    }
    if (d.type === 'listen-stop') {
      stopListening();
    }
  };
}

function send(msg) {
  if (bc) bc.postMessage(msg);
}

// ══════════════════════════════════════════════════════════════
// 语音识别
// ══════════════════════════════════════════════════════════════
const micRing = document.getElementById('micRing');
const transcript = document.getElementById('transcript');
const micHint = document.getElementById('micHint');
const qaResult = document.getElementById('qaResult');

if (!SpeechRecognition) {
  micRing.innerHTML = '<div style="font-size:36px">🚫</div>';
  micHint.innerHTML = '<div class="not-supported"><strong>浏览器不支持语音识别</strong><br>请使用 Chrome / Edge 浏览器打开此页面</div>';
} else {
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'zh-CN';

  recognition.onstart = () => {
    isListening = true;
    micRing.classList.add('listening');
    micHint.textContent = '🔴 正在监听…点击停止';
    transcript.classList.remove('placeholder');
  };

  recognition.onend = () => {
    isListening = false;
    micRing.classList.remove('listening');
    if (!manuallyStopped) {
      // 非手动停止（如浏览器超时）→ 自动重启
      micHint.textContent = '🔄 自动重启中…';
      setTimeout(() => {
        try { isListening = true; recognition.start(); } catch(e) {}
      }, 500);
      return;
    }
    manuallyStopped = false;
    micHint.textContent = '点击开始监听';
  };

  recognition.onerror = (e) => {
    console.log('Speech recognition error:', e.error);
    if (e.error === 'not-allowed') {
      micHint.textContent = '⚠️ 请允许麦克风权限';
    } else if (e.error !== 'no-speech' && e.error !== 'aborted') {
      micHint.textContent = '⚠️ 识别出错：' + e.error;
    }
  };

  recognition.onresult = (e) => {
    let finalText = '';
    let interimText = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        finalText += t;
      } else {
        interimText += t;
      }
    }

    // 更新显示
    let html = '';
    if (finalText) html += '<strong>' + finalText + '</strong>';
    if (interimText) html += '<span class="interim">' + interimText + '</span>';
    if (html) transcript.innerHTML = html;

    // 最终结果 → 发送到问答系统
    if (finalText.trim()) {
      send({ type: 'voice-question', text: finalText.trim() });
      processQuestion(finalText.trim());
    }
  };
}

function startListening() {
  if (!recognition || isListening) return;
  try {
    recognition.start();
  } catch(e) {}
}

function stopListening() {
  if (!recognition || !isListening) return;
  manuallyStopped = true;
  isListening = false;
  recognition.stop();
  micRing.classList.remove('listening');
  micHint.textContent = '点击开始监听';
}

micRing.addEventListener('click', () => {
  if (isListening) {
    stopListening();
  } else {
    startListening();
  }
});

// ══════════════════════════════════════════════════════════════
// 简单的问答匹配
// ══════════════════════════════════════════════════════════════
const QA_MAP = [
  { keywords:['提示词','prompt','怎么问','怎么写'], slide:7, a:'提示词工程的核心：定角色·讲要求·给参考·设标准。详见第7页。' },
  { keywords:['上下文','知识库','背景'], slide:8, a:'上下文工程最重要的是知识库——把背景资料喂给AI。详见第8页。' },
  { keywords:['规训','脚本','工作流','coze','dify'], slide:12, a:'规训工程六大组件：工具调用·约束安全·验证校验·状态管理·错误处理·可观测性。详见第12页。' },
  { keywords:['循环','loop','复盘','自查'], slide:16, a:'循环工程四部曲：自查→复盘→会诊→绩效。让AI做→查→修→再输出。详见第16页。' },
  { keywords:['隐私','安全','数据'], slide:18, a:'敏感信息用API，日常用Trae。API默认不用于训练。详见第18页。' },
  { keywords:['模型','选哪个','deepseek','千问','kimi','豆包'], slide:5, a:'没有最好的模型，只有最适合场景的模型。详见第5页模型对比表。' },
  { keywords:['token','费用','钱'], slide:20, a:'Token理解成手机流量，不用太纠结费用。真正关注用得对不对。' },
  { keywords:['招聘','简历','hr'], slide:10, a:'招聘简历案例：套规训工程六件套后，AI可以多维度评分+JD匹配+预警推荐。详见第10页。' },
  { keywords:['运费','对账','计算'], slide:11, a:'运费对账案例：脚本自动化，1秒零误差。详见第11页。' },
  { keywords:['生日','营销','400'], slide:14, a:'生日营销案例：数据流闭环，累计变现400万+。详见第14页。' },
];

function processQuestion(text) {
  const lower = text.toLowerCase();
  let bestMatch = null;
  let maxScore = 0;

  QA_MAP.forEach(item => {
    let score = 0;
    item.keywords.forEach(kw => {
      if (lower.includes(kw)) score++;
    });
    if (score > maxScore) { maxScore = score; bestMatch = item; }
  });

  if (bestMatch && maxScore > 0) {
    qaResult.classList.add('show');
    document.getElementById('qaQ').textContent = text;
    document.getElementById('qaA').innerHTML = bestMatch.a;
    document.getElementById('qaSlide').textContent = '→ 跳转到第' + bestMatch.slide + '页';

    document.getElementById('qaSlide').onclick = () => {
      send({ type:'goto', slide: bestMatch.slide });
    };

    // 添加到历史
    addHistory(text, bestMatch.a, bestMatch.slide);

    // 同时发送到控制面板
    send({ type: 'voice-answer', question: text, answer: bestMatch.a, slide: bestMatch.slide });
  } else {
    qaResult.classList.add('show');
    document.getElementById('qaQ').textContent = text;
    document.getElementById('qaA').textContent = '未匹配到预设回答，请在控制面板手动处理。';
    document.getElementById('qaSlide').textContent = '';
    addHistory(text, '（未匹配）', null);
  }
}

function addHistory(q, a, slide) {
  history.unshift({ q, a, slide, time: new Date().toLocaleTimeString() });
  renderHistory();
}

function renderHistory() {
  const box = document.getElementById('historyBox');
  const list = document.getElementById('historyList');
  if (history.length === 0) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  list.innerHTML = history.map(h =>
    '<div class="history-item">' +
    '<div class="hi-q">' + h.time + ' · ' + h.q + '</div>' +
    '<div class="hi-a">' + h.a + (h.slide ? ' <em>[P' + h.slide + ']</em>' : '') + '</div>' +
    '</div>'
  ).join('');
}

// ══════════════════════════════════════════════════════════════
// 同步状态
// ══════════════════════════════════════════════════════════════
function updateSync(ok) {
  document.getElementById('syncDot').className = ok ? 'dot' : 'dot offline';
  document.getElementById('syncText').textContent = ok ? '已连接' : '未连接';
}

setTimeout(() => { if (!connected) updateSync(false); }, 3000);
setInterval(() => { if (!connected) updateSync(false); }, 5000);
</script>
</body>
</html>

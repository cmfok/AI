<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>提问 · AI 真垃圾</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a12;--card:rgba(255,255,255,.05);--border:rgba(255,255,255,.08);
  --text:#f5f5f7;--dim:rgba(245,245,247,.52);--accent:#ff5a36;--green:#2e9d5e;
  --red:#e53e3e;--orange:#e87722;--purple:#9b59b6;
  --grad:linear-gradient(120deg,#ff5a36 0%,#ff8c5a 60%,#ffb36b 100%);
  --radius:14px;
  --sans:'Inter','Noto Sans SC',-apple-system,sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;padding:20px 16px 40px}
/* ── 头部 ── */
.header{text-align:center;margin-bottom:24px}
.header .emoji{font-size:40px;margin-bottom:8px}
.header h1{font-size:clamp(20px,4vw,28px);font-weight:700;margin-bottom:6px}
.header p{font-size:14px;color:var(--dim);line-height:1.5}
/* ── 当前页提示 ── */
.current-slide{
  background:rgba(255,90,54,.08);border:1px solid rgba(255,90,54,.15);
  border-radius:12px;padding:12px 16px;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;font-size:13px;color:#ffb36b;
}
.current-slide .cs-num{font-size:20px;font-weight:700;color:var(--text)}
/* ── 问题输入 ── */
.input-section{margin-bottom:20px}
.input-section label{display:block;font-size:13px;color:var(--dim);margin-bottom:8px}
.input-section textarea{
  width:100%;min-height:100px;padding:14px;border-radius:12px;
  border:1px solid var(--border);background:var(--card);color:var(--text);
  font-family:var(--sans);font-size:15px;line-height:1.6;resize:vertical;outline:none;
  transition:border-color .2s;
}
.input-section textarea:focus{border-color:var(--accent)}
.input-section textarea::placeholder{color:rgba(255,255,255,.2)}
.input-row{display:flex;gap:8px;margin-top:10px;align-items:center}
.name-input{
  flex:1;padding:10px 14px;border-radius:10px;
  border:1px solid var(--border);background:var(--card);color:var(--text);
  font-size:14px;outline:none;
}
.name-input::placeholder{color:rgba(255,255,255,.2)}
.submit-btn{
  padding:12px 24px;border-radius:10px;border:none;
  background:var(--accent);color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;white-space:nowrap;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.submit-btn:active{transform:scale(.97);background:#388bfd}
.submit-btn:disabled{opacity:.4;pointer-events:none}
/* ── 快捷标签 ── */
.quick-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tag-btn{
  padding:6px 14px;border-radius:8px;border:1px solid var(--border);
  background:rgba(255,255,255,.03);color:var(--dim);font-size:13px;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.tag-btn:active{background:rgba(255,255,255,.08)}
/* ── 我的问题列表 ── */
.my-questions{margin-top:20px}
.mq-title{font-size:12px;color:var(--dim);margin-bottom:10px;font-family:monospace;letter-spacing:.5px}
.mq-item{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;margin-bottom:8px;
}
.mq-item .mq-q{font-size:14px;line-height:1.5;margin-bottom:6px}
.mq-item .mq-meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--dim)}
.mq-item .mq-status{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:500}
.mq-item .mq-status.pending{background:rgba(232,119,34,.1);color:var(--orange)}
.mq-item .mq-status.answered{background:rgba(46,157,94,.1);color:var(--green)}
.mq-item .mq-answer{
  margin-top:8px;padding:10px 12px;border-radius:8px;
  background:rgba(255,90,54,.06);border:1px solid rgba(255,90,54,.1);
  font-size:13px;line-height:1.6;color:var(--dim);
}
.mq-item .mq-answer strong{color:var(--text)}
/* ── 场景选择 ── */
.scene-section{margin-bottom:16px}
.scene-section label{display:block;font-size:13px;color:var(--dim);margin-bottom:8px}
.scene-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.scene-btn{
  padding:10px 12px;border-radius:10px;border:1px solid var(--border);
  background:rgba(255,255,255,.02);color:var(--dim);font-size:13px;
  text-align:center;cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.scene-btn:active{background:rgba(255,255,255,.06)}
.scene-btn.selected{border-color:var(--accent);background:rgba(31,111,235,.08);color:var(--text)}
/* ── 成功提示 ── */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  padding:12px 24px;border-radius:10px;background:var(--green);color:#fff;
  font-size:14px;font-weight:500;z-index:100;opacity:0;transition:opacity .3s;
  pointer-events:none;
}
.toast.show{opacity:1}
/* ── 空状态 ── */
.empty{padding:20px;text-align:center;color:rgba(255,255,255,.15);font-size:13px}
</style>
</head>
<body>
<!-- 头部 -->
<div class="header">
  <div class="emoji">💬</div>
  <h1>AI 真垃圾 · 互动提问</h1>
  <p>扫码进入提问，你的问题会被实时展示在演讲者控制台上</p>
</div>

<!-- 当前页提示 -->
<div class="current-slide" id="currentSlide">
  <span>当前展示：</span>
  <span class="cs-num" id="csNum">P1</span>
  <span id="csTitle">封面</span>
</div>

<!-- 场景选择 -->
<div class="scene-section">
  <label>🎯 你在什么场景使用 AI？（可选，帮助 AI 更好地回答）</label>
  <div class="scene-grid" id="sceneGrid">
    <div class="scene-btn" data-scene="personal">👤 个人使用</div>
    <div class="scene-btn" data-scene="enterprise">🏢 企业落地</div>
    <div class="scene-btn" data-scene="learning">📚 学习了解</div>
    <div class="scene-btn" data-scene="curious">🤔 纯好奇</div>
  </div>
</div>

<!-- 问题输入 -->
<div class="input-section">
  <label>✍️ 请输入你的问题</label>
  <textarea id="questionInput" placeholder="比如：我们公司想用 AI 做数据分析，应该从哪开始？"></textarea>
  <div class="input-row">
    <input class="name-input" id="nameInput" placeholder="你的称呼（选填）" maxlength="20" />
    <button class="submit-btn" id="submitBtn" disabled>发送</button>
  </div>
  <div class="quick-tags" id="quickTags">
    <span class="tag-btn" data-q="AI 能帮我们做什么？">AI 能做什么？</span>
    <span class="tag-btn" data-q="怎么选择 AI 模型？">怎么选模型？</span>
    <span class="tag-btn" data-q="知识库怎么搭建？">知识库搭建</span>
    <span class="tag-btn" data-q="数据安全怎么保障？">数据安全</span>
    <span class="tag-btn" data-q="提示词怎么写才有效？">提示词写法</span>
    <span class="tag-btn" data-q="AI 项目落地要多少钱？">落地费用</span>
  </div>
</div>

<!-- 我的问题 -->
<div class="my-questions">
  <div class="mq-title">📋 我的提问</div>
  <div id="questionList"><div class="empty">还没有提交问题</div></div>
</div>

<!-- 成功提示 -->
<div class="toast" id="toast">✅ 问题已发送！</div>

<script>
// ══════════════════════════════════════════════════════════════
// 配置
// ══════════════════════════════════════════════════════════════
let selectedScene = '';
let questions = [];
let currentSlide = 1;

const TITLES = {
  1:'封面', 2:'外星人的语言', 3:'反认知·猜字系统', 4:'模型',
  5:'模型对比表', 6:'四大工程总览', 7:'提示词工程', 8:'上下文工程',
  9:'知识库搭建', 10:'招聘简历', 11:'运费对账', 12:'规训工程',
  13:'脚本vs工作流', 14:'生日营销', 15:'递进对比', 16:'循环工程',
  17:'个人vs企业AI', 18:'数据隐私', 19:'Checklist+工具包', 20:'互动答疑'
};

// ══════════════════════════════════════════════════════════════
// BroadcastChannel 通信
// ══════════════════════════════════════════════════════════════
let bc;
try { bc = new BroadcastChannel('ai3-control'); } catch(e) {}

if (bc) {
  bc.onmessage = e => {
    const d = e.data;
    if (d.type === 'current') {
      currentSlide = d.slide;
      updateCurrentSlide();
    }
    if (d.type === 'qa-answer') {
      // 控制面板回答了某个问题
      answerQuestion(d.questionId, d.answer);
    }
  };
}

function send(msg) {
  if (bc) bc.postMessage(msg);
}

// ══════════════════════════════════════════════════════════════
// UI 更新
// ══════════════════════════════════════════════════════════════
function updateCurrentSlide() {
  document.getElementById('csNum').textContent = 'P' + currentSlide;
  document.getElementById('csTitle').textContent = TITLES[currentSlide] || '';
}

// ══════════════════════════════════════════════════════════════
// 场景选择
// ══════════════════════════════════════════════════════════════
document.querySelectorAll('.scene-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedScene = btn.dataset.scene;
  });
});

// ══════════════════════════════════════════════════════════════
// 快捷标签
// ══════════════════════════════════════════════════════════════
document.querySelectorAll('.tag-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('questionInput').value = btn.dataset.q;
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('questionInput').focus();
  });
});

// ══════════════════════════════════════════════════════════════
// 输入框状态
// ══════════════════════════════════════════════════════════════
const questionInput = document.getElementById('questionInput');
const submitBtn = document.getElementById('submitBtn');
questionInput.addEventListener('input', () => {
  submitBtn.disabled = questionInput.value.trim().length === 0;
});

// ══════════════════════════════════════════════════════════════
// 提交问题
// ══════════════════════════════════════════════════════════════
submitBtn.addEventListener('click', () => {
  const text = questionInput.value.trim();
  if (!text) return;

  const name = document.getElementById('nameInput').value.trim() || '匿名';
  const q = {
    id: Date.now(),
    text: text,
    name: name,
    scene: selectedScene,
    slide: currentSlide,
    time: new Date().toLocaleTimeString(),
    status: 'pending',
    answer: null
  };

  questions.unshift(q);
  renderQuestions();

  // 发送到控制面板
  send({ type: 'audience-question', question: q });

  // 清空输入
  questionInput.value = '';
  submitBtn.disabled = true;

  // 显示成功提示
  showToast();
});

function showToast() {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function answerQuestion(qId, answer) {
  const q = questions.find(item => item.id === qId);
  if (q) {
    q.status = 'answered';
    q.answer = answer;
    renderQuestions();
  }
}

function renderQuestions() {
  const list = document.getElementById('questionList');
  if (questions.length === 0) {
    list.innerHTML = '<div class="empty">还没有提交问题</div>';
    return;
  }
  list.innerHTML = questions.map(q =>
    '<div class="mq-item">' +
      '<div class="mq-q">' + (q.name ? '<strong>' + q.name + '</strong>：' : '') + q.text + '</div>' +
      '<div class="mq-meta">' +
        '<span>' + q.time + ' · 当前P' + q.slide + '</span>' +
        '<span class="mq-status ' + q.status + '">' + (q.status === 'pending' ? '⏳ 等待回答' : '✅ 已回答') + '</span>' +
      '</div>' +
      (q.answer ? '<div class="mq-answer"><strong>💡 回答：</strong>' + q.answer + '</div>' : '') +
    '</div>'
  ).join('');
}
</script>
</body>
</html>

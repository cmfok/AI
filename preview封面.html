<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 真垃圾 · 分享会</title>
<link rel="stylesheet" href="../.agents/skills/html-ppt-full/assets/fonts.css">
<link rel="stylesheet" href="../.agents/skills/html-ppt-full/assets/base.css">
<link rel="stylesheet" href="../.agents/skills/html-ppt-full/assets/animations/animations.css">
<style>
/* tech-sharing 风格 (暗黑 + 代码感) */
:root{
  --bg:#0d1117;--bg-soft:#161b22;--surface:#161b22;
  --border:rgba(139,148,158,.22);
  --text-1:#e6edf3;--text-2:#8b949e;
  --accent:#7ee787;--accent-2:#79c0ff;
  --grad:linear-gradient(120deg,#7ee787 0%,#79c0ff 60%,#d2a8ff 100%);
  font-family:'Inter','Noto Sans SC',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:#0d1117;color:#e6edf3;
  display:flex;align-items:center;justify-content:center;
}
.deck{width:100vw;height:100vh;position:relative;display:flex;align-items:center;justify-content:center}
.slide{padding:72px 96px;background:#0d1117;position:relative;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center}
.slide::before{content:"";position:absolute;inset:0;
  background:radial-gradient(60% 50% at 90% 10%,rgba(121,192,255,.12),transparent 60%),
             radial-gradient(50% 50% at 10% 90%,rgba(126,231,135,.08),transparent 60%);
  pointer-events:none;z-index:0}
.slide>*{position:relative;z-index:1}
.kicker{color:#7ee787;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;margin-bottom:12px}
.kicker::before{content:"> "}
.h1{font-size:clamp(48px,7vw,96px);line-height:1.05;font-weight:800;letter-spacing:-.03em;color:#fff;margin-bottom:8px}
.h1 .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.lede{font-size:clamp(16px,1.6vw,22px);color:#8b949e;line-height:1.5;max-width:42ch;margin-bottom:24px}
.sub{font-size:clamp(13px,1.1vw,16px);color:#6e7681;line-height:1.5;max-width:50ch}
.speaker{display:flex;align-items:center;gap:12px;margin-top:20px;padding-top:20px;border-top:1px solid rgba(139,148,158,.15)}
.speaker .av{width:40px;height:40px;border-radius:50%;background:var(--grad);opacity:.8}
.speaker .info b{color:#f0f6fc;font-size:15px}
.speaker .info span{display:block;color:#8b949e;font-size:12px;margin-top:2px}
.tags{display:flex;gap:8px;margin-top:24px;flex-wrap:wrap}
.tag{font-size:11px;padding:4px 10px;border-radius:6px;background:rgba(139,148,158,.1);color:#8b949e;font-family:'JetBrains Mono',monospace}
.tag.accent{background:rgba(126,231,135,.1);color:#7ee787}
</style>
</head>
<body>
<div class="deck">
  <section class="slide">
    <p class="kicker anim-fade-up" data-anim="fade-up">share·ing / 2026-07-07</p>
    <h1 class="h1 anim-fade-up" data-anim="fade-up">AI 真垃圾<br><span class="grad">从用它到懂它</span></h1>
    <p class="lede mt-m" style="margin-top:16px">四大工程体系 × AI Agent 落地方法论</p>
    <p class="sub">从迷信到理解，从"AI瞎猜"到"让它猜准"</p>
    <div class="speaker">
      <div class="av"></div>
      <div class="info">
        <b>CM</b>
        <span>@ 开想传媒 · 2026-07-07</span>
      </div>
    </div>
    <div class="tags">
      <span class="tag accent">#提示词工程</span>
      <span class="tag">#上下文工程</span>
      <span class="tag">#规训工程</span>
      <span class="tag">#循环工程</span>
    </div>
  </section>
</div>
<script src="../.agents/skills/html-ppt-full/assets/runtime.js"></script>
</body>
</html>

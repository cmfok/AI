<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 自动对账 · 流水线</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:"Inter","Helvetica Neue","Noto Sans SC",sans-serif;overflow:hidden;padding:20px}
.pipeline-wrap{width:100%;max-width:640px;position:relative}
.timer{
  position:absolute;top:-10px;right:0;
  font-family:"JetBrains Mono","Consolas",monospace;
  font-size:36px;font-weight:800;color:rgba(255,255,255,.08);
  letter-spacing:-.04em;z-index:0;
}
.timer .num{color:#4caf50;font-size:42px}
.timer .unit{font-size:18px;color:rgba(255,255,255,.12)}
.pipeline{display:flex;flex-direction:column;gap:5px;position:relative;z-index:1}
.step{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);
  border-radius:10px;padding:10px 14px;
  opacity:0;transform:translateX(-20px);
  transition:all .4s cubic-bezier(.25,.46,.45,.94);
}
.step.visible{opacity:1;transform:translateX(0)}
.step.active{border-color:#4A90D9;background:rgba(74,144,217,.08)}
.step.done{border-color:rgba(76,175,80,.2);background:rgba(76,175,80,.04)}
.step .order{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(255,255,255,.3);font-weight:600;flex-shrink:0}
.step.active .order{background:#4A90D9;color:#fff}
.step.done .order{background:#4caf50;color:#fff}
.step .icon{font-size:18px;flex-shrink:0}
.step .info{flex:1;min-width:0}
.step .label{font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.5px;text-transform:uppercase}
.step .title{font-size:13px;font-weight:600;color:#f5f5f7}
.step .desc{font-size:11px;color:rgba(255,255,255,.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.step .status-icon{font-size:16px;opacity:0;transition:opacity .3s;flex-shrink:0}
.step.done .status-icon{opacity:1}
.step .counter{
  font-family:"JetBrains Mono","Consolas",monospace;
  font-size:20px;font-weight:700;color:#4A90D9;min-width:90px;text-align:right;
  transition:color .3s;
}
.step.done .counter{color:#4caf50}
.counter .unit-sm{font-size:12px;font-weight:400;color:rgba(255,255,255,.25);margin-left:2px}

.result-flash{
  margin-top:16px;text-align:center;
  opacity:0;transform:scale(.9);
  transition:all .5s cubic-bezier(.25,.46,.45,.94);
}
.result-flash.visible{opacity:1;transform:scale(1)}
.result-flash .big{font-size:44px;font-weight:800;color:#4caf50;letter-spacing:-.03em}
.result-flash .sub{font-size:14px;color:rgba(255,255,255,.3);margin-top:6px}
.result-flash .bulk{font-size:12px;color:rgba(255,255,255,.15);margin-top:4px;font-family:"JetBrains Mono",monospace}
</style>
</head>
<body>
<div class="pipeline-wrap">
  <div class="timer">⏱ <span class="num" id="timerNum">0.0</span><span class="unit">s</span></div>
  <div class="pipeline" id="pipeline"></div>
  <div class="result-flash" id="result">
    <div class="big">✅ 零误差</div>
    <div class="sub">全自动完成 · 无需人工核对</div>
    <div class="bulk">（本次共处理 21,530 条运单 · 总运费 ¥827,381.50）</div>
  </div>
</div>

<script>
const steps = [
  {icon:'📦', label:'STEP 01', title:'读取ERP发货数据', desc:'全部发货单', target:21530, suffix:'条'},
  {icon:'📋', label:'STEP 02', title:'包装方案核对', desc:'匹配产品→冰袋→箱子规格', target:21530, suffix:'条已匹配'},
  {icon:'⚖️', label:'STEP 03', title:'计算产品重量', desc:'产品+冰袋+箱子总重', target:21530, suffix:'条已处理'},
  {icon:'🧊', label:'STEP 04', title:'冰袋/箱子配置', desc:'按温区匹配保温方案', target:3, suffix:'温区全部匹配'},
  {icon:'📍', label:'STEP 05', title:'地址城市等级映射', desc:'362城市已分级', target:362, suffix:'城市'},
  {icon:'💰', label:'STEP 06', title:'首重续重计算', desc:'12档计费规则', target:12, suffix:'档全部计算'},
  {icon:'📊', label:'STEP 07', title:'出库费核算', desc:'出库+打包', target:21530, suffix:'条已核算'},
  {icon:'🚚', label:'STEP 08', title:'总运费汇总', desc:'最终金额', target:827381.50, suffix:'', isMoney:true},
];

const pipeline = document.getElementById('pipeline');
const timerNum = document.getElementById('timerNum');
let startTime = null;
let timerInterval = null;

steps.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'step';
  div.id = 'step_'+i;
  const displayTarget = s.isMoney ? ('¥ ' + s.target.toLocaleString()) : s.target.toLocaleString() + ' ' + s.suffix;
  div.innerHTML = `
    <div class="order">${i+1}</div>
    <div class="icon">${s.icon}</div>
    <div class="info">
      <div class="label">${s.label}</div>
      <div class="title">${s.title}</div>
      <div class="desc">${s.desc}</div>
    </div>
    <div class="counter" id="counter_${i}">0 ${s.suffix}</div>
    <div class="status-icon">✅</div>
  `;
  pipeline.appendChild(div);
});

function animateCounter(index, target, isMoney, suffix, duration, cb) {
  const el = document.getElementById('counter_'+index);
  const start = performance.now();
  
  function update(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    // ease-out
    const eased = 1 - Math.pow(1 - progress, 2);
    const current = Math.round(target * eased);
    
    if (isMoney) {
      el.textContent = '¥ ' + current.toLocaleString();
    } else {
      el.textContent = current.toLocaleString() + ' ' + suffix;
    }
    
    if (progress < 1) {
      requestAnimationFrame(update);
    } else {
      if (isMoney) {
        el.textContent = '¥ ' + target.toLocaleString();
      } else {
        el.textContent = target.toLocaleString() + ' ' + suffix;
      }
      if (cb) setTimeout(cb, 100);
    }
  }
  requestAnimationFrame(update);
}

function showStep(i) {
  if (i >= steps.length) {
    document.getElementById('result').classList.add('visible');
    clearInterval(timerInterval);
    return;
  }
  
  const el = document.getElementById('step_'+i);
  el.classList.add('visible','active');
  
  const s = steps[i];
  animateCounter(i, s.target, s.isMoney, s.suffix, 350);
  
  // Previous step -> done
  if (i > 0) {
    document.getElementById('step_'+(i-1)).classList.remove('active');
    document.getElementById('step_'+(i-1)).classList.add('done');
  }
  
  setTimeout(() => showStep(i + 1), 480);
}

// Timer
function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    timerNum.textContent = elapsed.toFixed(1);
  }, 50);
}

setTimeout(() => { startTimer(); showStep(0); }, 300);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>生日营销 · 闭环数据流</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:"Inter","Helvetica Neue","Noto Sans SC",sans-serif;overflow:hidden;padding:20px}
.wrap{width:100%;max-width:960px;position:relative}
.title{text-align:center;font-size:20px;font-weight:700;color:#f5f5f7;margin-bottom:24px;letter-spacing:2px}
.title .acc{color:#4A90D9}

.loop{position:relative;width:100%;max-width:900px;margin:0 auto}

/* Top row */
.top-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:4px}

.node{
  width:130px;text-align:center;
  opacity:0;transform:translateY(15px);
  transition:all .5s cubic-bezier(.25,.46,.45,.94);
}
.node.show{opacity:1;transform:translateY(0)}
.node .box{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:12px 8px;position:relative;
  transition:all .4s;
}
.node .box.active{border-color:#4A90D9;background:rgba(74,144,217,.1)}
.node .box.done{border-color:rgba(76,175,80,.2);background:rgba(76,175,80,.05)}
.node .icon{font-size:28px;margin-bottom:4px}
.node .lbl{font-size:12px;font-weight:600;color:#f5f5f7;margin-bottom:2px}
.node .desc{font-size:9px;color:rgba(255,255,255,.25)}
.node .tag{
  position:absolute;top:-8px;right:-4px;
  font-size:8px;padding:2px 6px;border-radius:4px;font-weight:600;
  opacity:0;transition:opacity .4s;
}
.node.show .tag{opacity:1}
.tag.tool{background:rgba(74,144,217,.2);color:#4A90D9}
.tag.safe{background:rgba(255,107,53,.2);color:#ff6b35}
.tag.check{background:rgba(76,175,80,.2);color:#4caf50}
.tag.state{background:rgba(156,39,176,.2);color:#ce93d8}
.tag.error{background:rgba(220,53,69,.2);color:#ff6b6b}
.tag.view{background:rgba(255,193,7,.2);color:#ffc107}

.arrow-h{font-size:20px;color:rgba(255,255,255,.12);flex-shrink:0;opacity:0;transition:opacity .4s}
.arrow-h.show{opacity:1}

/* Bottom row */
.bottom-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}

/* Right arrow down */
.arrow-down{text-align:center;font-size:18px;color:rgba(255,255,255,.12);padding:2px 0;opacity:0;transition:opacity .4s}
.arrow-down.show{opacity:1}

/* Left return arrow */
.return-row{display:flex;align-items:center;justify-content:flex-start;margin:4px 0 0 60px;opacity:0;transition:opacity .6s}
.return-row.show{opacity:1}
.return-row .arrow-return{font-size:18px;color:#4A90D9;margin:0 4px}
.return-row .label{font-size:10px;color:rgba(74,144,217,.5);font-weight:500;letter-spacing:.5px}
.return-line{flex:1;height:1px;border-top:1px dashed rgba(74,144,217,.2);margin:0 6px}

.legend{display:flex;justify-content:center;gap:16px;margin-top:20px;flex-wrap:wrap;opacity:0;transition:opacity .6s}
.legend.show{opacity:1}
.legend .item{display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,.35)}
.legend .dot{width:7px;height:7px;border-radius:2px}
.dot.tool{background:#4A90D9}
.dot.safe{background:#ff6b35}
.dot.check{background:#4caf50}
.dot.state{background:#ce93d8}
.dot.error{background:#ff6b6b}
.dot.view{background:#ffc107}

.result{text-align:center;margin-top:16px;opacity:0;transform:scale(.8);transition:all .5s cubic-bezier(.25,.46,.45,.94)}
.result.show{opacity:1;transform:scale(1)}
.result .big{font-size:32px;font-weight:800;color:#4caf50}
.result .sub{font-size:13px;color:rgba(255,255,255,.25);margin-top:3px}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">生日营销 · <span class="acc">规训工程</span> 实战闭环</div>
  
  <div class="loop">
    <!-- Top row -->
    <div class="top-row">
      <div class="node" id="n0">
        <div class="box"><div class="icon">👤</div><div class="lbl">用户</div><div class="desc">扫码进小程序</div></div>
      </div>
      <div class="arrow-h" id="a0">→</div>
      
      <div class="node" id="n1">
        <div class="box"><div class="icon">📱</div><div class="lbl">小程序</div><div class="desc">填生日+地址</div></div>
      </div>
      <div class="arrow-h" id="a1">→</div>
      
      <div class="node" id="n2">
        <div class="box">
          <span class="tag safe">🛡约束</span>
          <div class="icon">🗄️</div>
          <div class="lbl">数据库</div>
          <div class="desc">存客户资料</div>
        </div>
      </div>
      <div class="arrow-h" id="a2">→</div>
      
      <div class="node" id="n3">
        <div class="box">
          <span class="tag tool">🔧工具</span>
          <span class="tag check" style="top:8px;right:-4px">✅校验</span>
          <div class="icon">🤖</div>
          <div class="lbl">AI 处理</div>
          <div class="desc">每天扫描·查农历阳历</div>
        </div>
      </div>
      <div class="arrow-h" id="a3">→</div>
      
      <div class="node" id="n4">
        <div class="box">
          <span class="tag state">📦状态</span>
          <span class="tag error" style="top:8px;right:-4px">🔄容错</span>
          <div class="icon">📊</div>
          <div class="lbl">分析匹配</div>
          <div class="desc">筛选7天内生日</div>
        </div>
      </div>
    </div>
    
    <!-- Right arrow down -->
    <div class="arrow-down" id="down1">↓</div>
    
    <!-- Bottom row (reverse direction) -->
    <div class="bottom-row">
      <div style="width:130px"></div>
      <div class="arrow-h" style="visibility:hidden">→</div>
      
      <div class="node" id="n5">
        <div class="box">
          <span class="tag view">📊观测</span>
          <div class="icon">💬</div>
          <div class="lbl">企业微信客服</div>
          <div class="desc">联系客户·送礼品</div>
        </div>
      </div>
      <div class="arrow-h" id="a5">→</div>
      
      <!-- User reappears here but we skip the icon, just show actions -->
      <div class="node" id="n6">
        <div class="box"><div class="icon">📦</div><div class="lbl">收到礼品</div><div class="desc">被种草·想回购</div></div>
      </div>
      <div class="arrow-h" id="a6">→</div>
      
      <div class="node" id="n7">
        <div class="box">
          <span class="tag state">📦状态</span>
          <div class="icon">🛒</div>
          <div class="lbl">复购下单</div>
          <div class="desc">购买产品</div>
        </div>
      </div>
      <div class="arrow-h" id="a7">→</div>
      
      <div class="node" id="n8">
        <div class="box"><div class="icon">🚚</div><div class="lbl">发货</div><div class="desc">ERP自动推单</div></div>
      </div>
      <div class="arrow-h" id="a8">→</div>
      
      <div class="node" id="n9">
        <div class="box"><div class="icon">💰</div><div class="lbl">进公司口袋</div><div class="desc">累计 400 万+</div></div>
      </div>
    </div>
    
    <!-- Return arrow to top -->
    <div class="return-row" id="return">
      <span class="arrow-return">↩</span>
      <span class="return-line"></span>
      <span class="label">每天自动循环</span>
    </div>
  </div>
  
  <div class="legend" id="legend">
    <div class="item"><span class="dot tool"></span>工具调用</div>
    <div class="item"><span class="dot safe"></span>约束安全</div>
    <div class="item"><span class="dot check"></span>验证校验</div>
    <div class="item"><span class="dot state"></span>状态管理</div>
    <div class="item"><span class="dot error"></span>错误处理</div>
    <div class="item"><span class="dot view"></span>可观测性</div>
  </div>
  
  <div class="result" id="result">
    <div class="big">✅ 闭环跑通 · 每日自动循环</div>
    <div class="sub">规训工程六大组件全部落地 · 累计变现 400 万+</div>
  </div>
</div>

<script>
const nodes = ['n0','n1','n2','n3','n4','n5','n6','n7','n8','n9'];
const arrows = ['a0','a1','a2','a3','down1','a5','a6','a7','a8'];

function showNode(i) {
  if (i >= nodes.length) {
    document.getElementById('return').classList.add('show');
    document.getElementById('legend').classList.add('show');
    setTimeout(() => document.getElementById('result').classList.add('show'), 400);
    return;
  }
  const el = document.getElementById(nodes[i]);
  el.classList.add('show','active');
  
  if (i > 0 && i-1 < arrows.length) {
    const a = document.getElementById(arrows[i-1]);
    if (a) a.classList.add('show');
    const prev = document.getElementById(nodes[i-1]);
    if (prev) { prev.classList.remove('active'); prev.classList.add('done'); }
  }
  
  setTimeout(() => showNode(i + 1), 400);
}

setTimeout(() => showNode(0), 300);
</script>
</body>
</html>

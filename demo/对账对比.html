<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>运费对账 · 对比</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:"Inter","Helvetica Neue","Noto Sans SC",sans-serif;gap:2px;padding:20px}

.side{flex:1;max-width:50%;min-width:340px;border-radius:16px;overflow:hidden;height:80vh;display:flex;flex-direction:column}

.left{background:rgba(255,107,53,.04);border:1px solid rgba(255,107,53,.15)}
.right{background:rgba(76,175,80,.04);border:1px solid rgba(76,175,80,.15)}

.header{
  padding:16px 20px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.header .tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:4px;letter-spacing:1px}
.left .tag{background:rgba(255,107,53,.15);color:#ff6b35}
.right .tag{background:rgba(76,175,80,.15);color:#4caf50}
.header h3{font-size:16px;font-weight:600;color:#f5f5f7}
.header .time{font-size:13px;color:rgba(255,255,255,.3);margin-left:auto}

.content{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.content iframe{width:100%;height:100%;border:none}
</style>
</head>
<body>
<div class="side left">
  <div class="header">
    <span class="tag">❌ 人工</span>
    <h3>Excel 手工对账</h3>
    <span class="time">⏱ ~4小时</span>
  </div>
  <div class="content">
    <iframe src="excel_animation.html"></iframe>
  </div>
</div>
<div class="side right">
  <div class="header">
    <span class="tag">✅ 自动</span>
    <h3>AI 脚本对账</h3>
    <span class="time">⏱ 1秒</span>
  </div>
  <div class="content">
    <iframe src="pipeline_animation.html"></iframe>
  </div>
</div>
</body>
</html>

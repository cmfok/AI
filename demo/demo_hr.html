<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>现场演示 · 简历分析 + HR Agent对话</title>
<style>
:root{
  --paper:#fafaf8;--ink:#0a0a0a;--grey-1:#f0f0ee;--grey-2:#d4d4d2;--grey-3:#737373;
  --accent:#002FA7;--accent-rgb:0,47,167;--accent-on:#ffffff;
  --text-primary:#0a0a0a;--text-secondary:#525252;--text-helper:#737373;
  --sans:"Inter","Helvetica Neue","Helvetica","Arial","Segoe UI",system-ui,sans-serif;
  --sans-zh:"PingFang SC","Noto Sans SC","Microsoft YaHei","微软雅黑",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--sans),var(--sans-zh);background:var(--paper);color:var(--ink)}
body{display:flex;flex-direction:column;padding:2vh 3vw}
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1vh;padding-bottom:1.5vh;border-bottom:1px solid var(--grey-2);flex-shrink:0}
.header h1{font-weight:200;font-size:min(4vw,5vh);line-height:1.1}
.header-actions{display:flex;align-items:center;gap:1vw;flex-wrap:wrap}
.header-actions a{font-size:max(13px,.8vw);color:var(--accent);font-weight:500;text-decoration:none}
.file-upload{display:inline-flex;align-items:center;gap:.4vw;padding:.5vh 1vw;background:var(--accent);color:#fff;border-radius:6px;font-size:max(12px,.65vw);cursor:pointer;font-weight:500}
.file-upload input{display:none}
.main{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:1vw;min-height:0;padding-top:1.5vh}
.panel{display:flex;flex-direction:column;gap:.4vh;min-height:0}
.panel-title{font-size:max(12px,.7vw);font-weight:600;color:var(--text-helper);padding:0 .4vw;flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.chat-area{flex:1;background:var(--grey-1);border-radius:8px;padding:1vh;overflow-y:auto;min-height:0}
.msg-box{background:var(--paper);border-radius:6px;padding:.6vh .8vw;font-size:max(11px,.62vw);line-height:1.5;border-left:3px solid transparent;margin-bottom:.4vh}
.msg-user{border-left-color:var(--grey-2)}
.msg-ai{border-left-color:var(--accent)}
.msg-thinking{background:transparent;border-left:3px dashed var(--grey-2);color:var(--text-helper);font-style:italic}
.msg-error{border-left-color:#d32f2f;color:#d32f2f;background:rgba(211,47,47,.04)}
.status{font-size:max(10px,.56vw);color:var(--text-helper);flex-shrink:0;padding:0 .4vw}

.ent-card{margin-top:.4vh;background:var(--paper);border-radius:6px;border:1px solid var(--grey-2)}
.ent-card-hd{padding:.5vh .8vw;background:var(--grey-1);font-weight:600;font-size:max(11px,.62vw)}
.ent-card-bd{padding:.6vh .8vw;font-size:max(10px,.58vw);line-height:1.5}
.ent-tbl{width:100%;border-collapse:collapse;margin-top:.3vh}
.ent-tbl td{padding:.2vh .4vw;font-size:max(10px,.56vw);border-bottom:1px solid var(--grey-2)}
.ent-tbl tr:last-child td{border-bottom:none}

.retry-btn{margin-top:.3vh;padding:.4vh 1vw;background:var(--accent);color:#fff;border-radius:4px;cursor:pointer;display:inline-block;font-size:max(11px,.6vw);border:none}

@media(max-width:768px){
  .main{grid-template-columns:1fr;grid-template-rows:1fr 1fr}
  .header h1{font-size:min(6vw,4vh)}
}
</style>
</head>
<body>
<div class="header">
  <div>
    <div style="font-size:max(11px,.65vw);color:var(--accent);letter-spacing:.12em;margin-bottom:.3vh">LIVE DEMO · MiMo 多模态 vs G5 企业级 Pipeline</div>
    <h1>上传简历，AI实时分析</h1>
    <div style="font-size:max(10px,.56vw);color:var(--text-helper);margin-top:.2vh">本次测试使用模型均为 MiMo V2.5</div>
  </div>
  <div class="header-actions">
    <span id="fileStatus" style="font-size:max(11px,.65vw);color:var(--text-helper)">未选文件</span>
    <label class="file-upload">📎 选择简历文件<input type="file" id="resumeFile" accept=".pdf"></label>
    <a href="http://106.53.168.220:8008/?slide=4">← 返回PPT</a>
  </div>
</div>
<div class="main">
  <div class="panel">
    <div class="panel-title">🤖 MiMo 多模态（通用AI）</div>
    <div class="chat-area" id="chatLeft">
      <div class="msg-box msg-ai" style="border-left-color:var(--grey-2);color:var(--text-helper)">上传 PDF 简历后自动分析</div>
    </div>
    <div class="status" id="statusLeft"></div>
  </div>
  <div class="panel">
    <div class="panel-title">
      <span>💬 HR Agent · 飞书实时对话</span>
      <span id="hrSessionInfo" style="font-size:max(10px,.56vw);color:var(--text-helper)"></span>
    </div>
    <div class="chat-area" id="chatRight">
      <div class="msg-box msg-ai" style="border-left-color:var(--grey-2);color:var(--text-helper)">正在连接 HR Agent...</div>
    </div>
    <div class="status" id="statusRight"></div>
  </div>
</div>

<script>
console.log('demo_hr loaded');
let resumePdfBase64='', resumePdfFilename='', resumeFileBlobUrl='';
// HR Agent
let hrSessionId=null, hrLastLine=0, hrPollTimer=null, hrShown=new Set();

document.getElementById('resumeFile').addEventListener('change',async function(e){
  const file=e.target.files[0];if(!file)return;
  if(resumeFileBlobUrl)URL.revokeObjectURL(resumeFileBlobUrl);
  resumeFileBlobUrl=URL.createObjectURL(file);
  document.getElementById('fileStatus').innerHTML='📄 <a href="'+resumeFileBlobUrl+'" target="_blank" style="color:var(--accent);text-decoration:underline">'+file.name+'</a>';
  try{
    const b64=await new Promise((resolve,reject)=>{
      const r=new FileReader();
      r.onload=()=>resolve(r.result.split(',')[1]);
      r.onerror=()=>reject(new Error('读取失败'));
      r.readAsDataURL(file);
    });
    resumePdfBase64=b64;resumePdfFilename=file.name;
    analyzeBoth();
  }catch(err){alert('文件读取失败: '+err.message);}
});

function renderMarkdown(md){
  if(!md)return'';
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h4 style="margin:1vh 0 .4vh;font-weight:600">$1</h4>')
    .replace(/^## (.+)$/gm,'<h3 style="margin:1.2vh 0 .6vh;font-weight:600;font-size:max(13px,.75vw)">$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^- (.+)$/gm,'<li style="margin-left:1.2em">$1</li>')
    .replace(/^(\d+)\. (.+)$/gm,'<li style="margin-left:1.2em">$2</li>')
    .replace(/\n\n/g,'<br/><br/>')
    .replace(/\n/g,'<br/>');
}

function formatDetails(arr){
  if(!arr||!arr.length)return'';
  return arr.map(d=>{
    if(typeof d==='string')return d;
    const item=d.item||d.name||'';
    const req=d.requirement||d.req||'';
    const actual=d.actual||'';
    const pass=d.pass!==false?'✅':'❌';
    return pass+' <strong>'+item+'</strong>'+(req?'（要求:'+req+'）':'')+(actual?' → 实际:'+actual:'');
  }).join('<br/>');
}

async function analyzeBoth(){
  const cl=document.getElementById('chatLeft');
  const sl=document.getElementById('statusLeft');
  const userPrompt='请作为一名拥有10年经验的资深HR招聘专家，分析这份简历：给出各维度评分（学历/经验/能力/细节/表达）、总评分、是否推荐面试及理由。';
  cl.innerHTML='<div class="msg-box msg-user"><strong>👤 你的提示词</strong><br/>'+userPrompt+'</div><div class="msg-box msg-thinking" id="thinkL">🤖 MiMo 多模态分析中...</div>';
  sl.textContent='分析中...';
  const body={file_base64:resumePdfBase64,filename:resumePdfFilename||'resume.pdf'};
  fetch('/r/resume/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json()).then(d1=>{
    document.getElementById('thinkL')?.remove();
    if(d1.ok){cl.innerHTML+='<div class="msg-box msg-ai">'+renderMarkdown(d1.result||'')+'</div>';sl.textContent='完成 ✓';}
    else{cl.innerHTML+='<div class="msg-box msg-error"><strong>⚠️</strong><br/>'+(d1.error||'分析失败')+'</div>';sl.textContent='失败';}
    cl.scrollTop=cl.scrollHeight;
  }).catch(e=>{document.getElementById('thinkL')?.remove();cl.innerHTML+='<div class="msg-box msg-error"><strong>⚠️</strong><br/>'+e.message+'</div>';sl.textContent='失败';});
}

// HR Agent
async function initHrAgent(){
  const cr=document.getElementById('chatRight'),sr=document.getElementById('statusRight');
  try{
    const r=await fetch('/api/hr-session/latest');
    const d=await r.json();
    if(!d.ok){cr.innerHTML='<div class="msg-box msg-ai" style="border-left-color:var(--grey-2);color:var(--text-helper)">暂无 HR Agent 会话</div>';return;}
    hrSessionId=d.session_id;
    document.getElementById('hrSessionInfo').textContent='📋 '+hrSessionId.substring(0,8);
    await loadHrMessages(0);
    startHrPolling();
  }catch(e){cr.innerHTML='<div class="msg-box msg-error">连接 HR Agent 失败: '+e.message+'</div>';}
}
async function loadHrMessages(fromLine){
  if(!hrSessionId)return;
  try{
    const r=await fetch('/api/hr-session/'+hrSessionId+'?from='+fromLine);
    const d=await r.json();
    if(!d.ok)return;
    const cr=document.getElementById('chatRight');
    if(fromLine===0&&d.messages.length>0)cr.innerHTML='';
    let added=0;
    for(const m of d.messages){
      const key=m.line+'-'+m.role+'-'+m.ts;
      if(hrShown.has(key))continue;
      // 卡片优先显示（无论什么 role）
      if(m.card){
        hrShown.add(key);
        const div=document.createElement('div');
        div.className='msg-box msg-ai';div.style.borderLeft='none';div.style.padding='0';div.style.background='transparent';
        div.innerHTML='<div style="font-weight:600;font-size:max(10px,.55vw);color:var(--text-helper);margin-bottom:.3vh">🤖 HR Agent · 简历分析卡片</div>'+renderFeishuCard(m.card);
        cr.appendChild(div);added++;continue;
      }
      // 隐藏工具结果
      if(m.role==='toolRe'||m.role==='toolResult')continue;
      // 隐藏纯工具调用消息
      if(m.text.startsWith('🔧'))continue;
      if(m.text.startsWith('📋'))continue;
      // 去除思考前缀
      let displayText=m.text;
      if(displayText.startsWith('💭 '))displayText=displayText.substring(2);
      hrShown.add(key);
      const div=document.createElement('div');
      div.className='msg-box '+(m.role==='user'?'msg-user':'msg-ai');
      if(m.card){div.innerHTML='<div style="font-weight:600;font-size:max(10px,.55vw);color:var(--text-helper);margin-bottom:.3vh">🤖 HR Agent · 简历分析卡片</div>'+renderFeishuCard(m.card);div.style.borderLeft='none';div.style.padding='0';div.style.background='transparent';}
      else if(m.role==='user'){div.innerHTML='<strong>👤 飞书用户</strong><br/>'+escapeHtml(displayText);
        // 自动发送到通用AI（检测文件路径，有则传PDF）
        const cl=document.getElementById('chatLeft');
        cl.innerHTML+='<div class="msg-box msg-user"><strong>👤 飞书消息</strong><br/>'+escapeHtml(m.text)+'</div>';
        autoSendToMiMo(m.text, cl);
      }
      // toolResult 中包含文件路径也发送给 MiMo
      else if((m.role==='toolRe'||m.role==='toolResult') && m.text.match(/\/[^ \n]+\.(pdf|doc|docx|txt)/i)){
        const cl=document.getElementById('chatLeft');
        cl.innerHTML+='<div class="msg-box msg-user"><strong>👤 飞书文件</strong><br/>'+escapeHtml(m.text.substring(0,100))+'</div>';
        autoSendToMiMo(m.text, cl);
      }
      else{div.innerHTML='<strong>🤖 HR Agent</strong><br/>'+escapeHtml(displayText);}
      cr.appendChild(div);added++;
    }
	    hrLastLine=Math.max(hrLastLine,d.total_lines);
	    // 只有用户在底部附近时才自动滚动（防干扰向上翻阅）
	    const nearBottom=cr.scrollHeight-cr.scrollTop-cr.clientHeight<100;
	    if(nearBottom||added>0)cr.scrollTop=cr.scrollHeight;
    document.getElementById('statusRight').textContent='已加载 '+hrShown.size+' 条消息';
  }catch(e){}
}
function startHrPolling(){
  if(hrPollTimer)clearInterval(hrPollTimer);
  hrPollTimer=setInterval(async()=>{
    // 检查是否有新会话
    try{
      const lr=await fetch('/api/hr-session/latest');
      const ld=await lr.json();
      if(ld.ok && ld.session_id!==hrSessionId){
        hrSessionId=ld.session_id;hrLastLine=0;
        document.getElementById('hrSessionInfo').textContent='📋 '+hrSessionId.substring(0,8);
        document.getElementById('chatRight').innerHTML='';
      }
    }catch(e){}
    loadHrMessages(hrLastLine);
  },2000);
}
function renderFeishuCard(card){
  try{
    const body=JSON.parse(card.content||'{}');
    function md(s){return(s||'').replace(/\n\n/g,'<br/><br/>').replace(/\n/g,'<br/>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/<font color='(\w+)'>/g,'<span style="color:$1">').replace(/<\/font>/g,'</span>');}
    function dc(el){return md(el.text?.content||el.content||'');}
    let h='<div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:max(11px,.6vw)">';
    const hdr=body.header||{};
    if(hdr.title)h+='<div style="background:var(--accent);color:#fff;padding:1.2vh 1.4vw;font-weight:600">'+(hdr.title.content||hdr.title.tag||'')+'</div>';
    for(const el of body.body?.elements||[]){
      if(el.tag==='markdown')h+='<div style="padding:.6vh 1.4vw;line-height:1.6">'+md(el.content)+'</div>';
      else if(el.tag==='hr')h+='<hr style="border:none;border-top:1px solid var(--grey-2);margin:.2vh 1.4vw">';
      else if(el.tag==='div')h+='<div style="padding:.6vh 1.4vw;line-height:1.7">'+dc(el)+'</div>';
      else if(el.tag==='column_set'){h+='<div style="display:flex;padding:.4vh 1.4vw;gap:.6vw">';for(const col of el.columns||[]){h+='<div style="flex:'+(col.weight||1)+'">';for(const ce of col.elements||[]){if(ce.tag==='markdown')h+='<div style="line-height:1.8">'+md(ce.content)+'</div>';else if(ce.tag==='hr')h+='<hr style="border:none;border-top:1px solid var(--grey-2);margin:.4vh 0">';}h+='</div>';}h+='</div>';}
    }
    h+='</div>';return h;
  }catch(e){return'<div style="color:#d32f2f">卡片渲染失败</div>';}
}
function escapeHtml(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>');}

async function autoSendToMiMo(text, cl){
  // 检测文件路径: /root/.openclaw/media/inbound/xxx.pdf
  const fileMatch=text.match(/\/[^ \n]+\.(pdf|doc|docx|txt)/i);
  cl.innerHTML+='<div class="msg-box msg-thinking">🤖 MiMo 分析中...</div>';cl.scrollTop=cl.scrollHeight;
  
  let body;
  if(fileMatch){
    // 通过 API 读取服务器文件
    try{
      const r=await fetch('/api/read-file?path='+encodeURIComponent(fileMatch[0]));
      const d=await r.json();
      if(d.ok){
        body={file_base64:d.base64, filename:d.filename};
        cl.querySelector('.msg-thinking').textContent='🤖 MiMo 多模态分析中（PDF文件）...';
      }else{body={resume:text};}
    }catch(e){body={resume:text};}
  }else{body={resume:text};}
  
  fetch('/r/resume/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json()).then(d=>{
    cl.querySelector('.msg-thinking')?.remove();
    if(d.ok){cl.innerHTML+='<div class="msg-box msg-ai">'+renderMarkdown(d.result||'')+'</div>';}
    else{cl.innerHTML+='<div class="msg-box msg-error">⚠️ '+(d.error||'失败')+'</div>';}
    cl.scrollTop=cl.scrollHeight;
  }).catch(e=>{cl.querySelector('.msg-thinking')?.remove();cl.innerHTML+='<div class="msg-box msg-error">⚠️ '+e.message+'</div>';});
}

initHrAgent();
</script>

</body>
</html>

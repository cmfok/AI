<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>人工对账 · Excel 模拟</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:"Segoe UI","Helvetica Neue",sans-serif;overflow:hidden}
.wrap{position:relative;display:inline-block}
/* pain point tags */
.pain-tags{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:30}
.pain{
  position:absolute;padding:5px 12px;border-radius:6px;
  font-size:13px;font-weight:600;letter-spacing:.5px;
  opacity:0;transition:all .6s cubic-bezier(.25,.46,.45,.94);
  white-space:nowrap;
}
.pain.show{opacity:1}
.pain.orange{background:rgba(255,107,53,.12);border:1px solid rgba(255,107,53,.3);color:#ff6b35}
.pain.red{background:rgba(220,53,69,.12);border:1px solid rgba(220,53,69,.3);color:#ff6b6b}
.pain.amber{background:rgba(255,193,7,.12);border:1px solid rgba(255,193,7,.3);color:#ffc107}

/* positioning */
.p1{top:2%;left:-160px}
.p2{top:18%;left:-160px}
.p3{top:34%;left:-160px}
.p4{top:50%;left:-160px}
.p5{top:66%;left:-160px}
.p6{top:82%;left:-160px}
.p7{right:-160px;top:10%}
.p8{right:-160px;top:26%}
.p9{right:-160px;top:42%}
.p10{right:-160px;top:58%}
.p11{right:-160px;top:74%}

.excel-window{width:680px;border-radius:10px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.08);position:relative;z-index:1}
/* title bar */
.title-bar{background:#f0f0f0;padding:8px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #d0d0d0}
.title-bar .dots{display:flex;gap:6px}
.title-bar .dot{width:12px;height:12px;border-radius:50%}
.dot.red{background:#ff5f56}
.dot.yellow{background:#ffbd2e}
.dot.green{background:#27c93f}
.title-bar .name{font-size:13px;color:#555;font-weight:500}
/* toolbar */
.toolbar{background:#f8f8f8;padding:4px 10px;display:flex;gap:12px;font-size:12px;color:#666;border-bottom:1px solid #e0e0e0;flex-wrap:wrap}
.toolbar span{background:#fff;padding:2px 10px;border-radius:3px;border:1px solid #ddd;font-size:11px}
/* formula bar */
.formula-bar{background:#fff;padding:4px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #e0e0e0;font-size:13px}
.formula-bar .cell-ref{background:#f0f0f0;padding:2px 10px;border-radius:3px;font-weight:600;min-width:50px;text-align:center;color:#333}
.formula-bar .formula{color:#333;flex:1;font-family:"Consolas","Courier New",monospace;min-height:24px;display:flex;align-items:center}
.formula-bar .formula .cursor-blink{display:inline-block;width:2px;height:18px;background:#333;animation:blink 1s step-end infinite;margin-left:1px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
/* column headers */
.col-headers{display:flex;background:#f8f8f8;border-bottom:1px solid #e0e0e0}
.col-headers .corner{width:50px;min-width:50px;border-right:1px solid #e0e0e0;height:24px}
.col-headers .col{flex:1;text-align:center;font-size:11px;color:#666;padding:3px 0;border-right:1px solid #e0e0e0;font-weight:500}
/* grid */
.grid{background:#fff;position:relative;overflow:hidden}
.row{display:flex;border-bottom:1px solid #f0f0f0}
.row .rn{width:50px;min-width:50px;background:#f8f8f8;border-right:1px solid #e0e0e0;text-align:center;font-size:11px;color:#888;padding:4px 0}
.row .cell{flex:1;border-right:1px solid #f0f0f0;padding:4px 8px;font-size:12px;color:#333;font-family:"Consolas","Courier New",monospace;min-height:28px;display:flex;align-items:center}
.row .cell.highlight{background:#fff3cd}
.row .cell.editing{background:#d4edda;box-shadow:inset 0 0 0 2px #28a745}
.row .cell.error{background:#f8d7da;color:#dc3545}
/* cursor */
.cursor{position:absolute;width:120px;height:20px;border:2px solid #28a745;pointer-events:none;transition:all .6s cubic-bezier(.25,.46,.45,.94);z-index:10}
.cursor::after{content:"🖱";position:absolute;left:-18px;top:-8px;font-size:16px;opacity:.8}
/* mouse */
.mouse-pointer{position:absolute;font-size:22px;pointer-events:none;transition:all .8s cubic-bezier(.25,.46,.45,.94);z-index:20;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
/* legend */
.legend{position:absolute;top:50%;right:-10px;transform:translateY(-50%);font-size:18px;color:#ff6b35;font-weight:700;writing-mode:vertical-lr;letter-spacing:2px;opacity:.7}
</style>
</head>
<body>
<div class="wrap">
<div class="pain-tags">
  <div class="pain red p1">⚠ 漏算风险高</div>
  <div class="pain red p2">⚠ 容易算错</div>
  <div class="pain orange p3">⚠ 公式易出错</div>
  <div class="pain red p4">⚠ 数据量大卡顿</div>
  <div class="pain amber p5">⚠ 眼睛看花</div>
  <div class="pain red p6">⚠ 核对耗时</div>
  <div class="pain red p7">⚠ 前后不一致</div>
  <div class="pain orange p8">⚠ 重复劳动</div>
  <div class="pain red p9">⚠ 容易漏行</div>
  <div class="pain amber p10">⚠ 加班核对</div>
  <div class="pain red p11">⚠ 电脑死机</div>
</div>
<div class="excel-window" id="excel">
  <div class="title-bar">
    <div class="dots"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
    <span class="name">📊 运费对账表 - Excel</span>
  </div>
  <div class="toolbar">
    <span>文件</span><span>开始</span><span>插入</span><span>公式</span><span>数据</span><span>审阅</span><span>视图</span>
  </div>
  <div class="formula-bar">
    <span class="cell-ref" id="cellRef">E5</span>
    <span class="formula" id="formulaDisplay">=<span id="formulaText"></span><span class="cursor-blink"></span></span>
  </div>
  <div class="col-headers">
    <div class="corner"></div>
    <div class="col">A<br>单号</div>
    <div class="col">B<br>重量kg</div>
    <div class="col">C<br>首重</div>
    <div class="col">D<br>续重</div>
    <div class="col">E<br>运费</div>
    <div class="col">F<br>核对</div>
  </div>
  <div class="grid" id="grid" style="height:400px;position:relative">
    <!-- rows will be generated by JS -->
  </div>
</div>

<script>
const grid = document.getElementById('grid');
const cellRef = document.getElementById('cellRef');
const formulaText = document.getElementById('formulaText');

// Generate Excel rows
const data = [
  ['SF001', '3.2', '12', '5', '', ''],
  ['SF002', '5.8', '12', '5', '', ''],
  ['SF003', '1.5', '12', '5', '', ''],
  ['SF004', '8.0', '12', '5', '', ''],
  ['SF005', '2.1', '12', '5', '', ''],
  ['SF006', '6.5', '12', '5', '', ''],
  ['SF007', '4.0', '12', '5', '', ''],
  ['SF008', '9.5', '12', '5', '', ''],
  ['SF009', '3.0', '12', '5', '', ''],
  ['SF010', '7.2', '12', '5', '', ''],
  ['合计', '', '', '', '', ''],
];

function renderGrid() {
  data.forEach((row, i) => {
    const div = document.createElement('div');
    div.className = 'row';
    const rn = document.createElement('div');
    rn.className = 'rn';
    rn.textContent = i + 1;
    div.appendChild(rn);
    row.forEach((cell, j) => {
      const c = document.createElement('div');
      c.className = 'cell';
      c.dataset.row = i;
      c.dataset.col = j;
      c.id = `cell_${i}_${j}`;
      c.textContent = cell;
      div.appendChild(c);
    });
    grid.appendChild(div);
  });
}
renderGrid();

// Animation sequence
const cells = {
  body: document.querySelector('.excel-window'),
  cursor: null,
  pointer: null,
};

function createCursor() {
  const c = document.createElement('div');
  c.className = 'cursor';
  grid.appendChild(c);
  return c;
}

function createPointer() {
  const p = document.createElement('div');
  p.className = 'mouse-pointer';
  p.textContent = '🖱';
  grid.appendChild(p);
  return p;
}

function getCellPos(row, col) {
  const el = document.getElementById(`cell_${row}_${col}`);
  if (!el) return {x: 0, y: 0};
  const rect = el.getBoundingClientRect();
  const gridRect = grid.getBoundingClientRect();
  return {
    x: rect.left - gridRect.left + 20,
    y: rect.top - gridRect.top + 2,
    w: rect.width,
    h: rect.height,
  };
}

function typeFormula(text, cb) {
  let idx = 0;
  formulaText.textContent = '';
  const interval = setInterval(() => {
    if (idx < text.length) {
      formulaText.textContent += text[idx];
      idx++;
    } else {
      clearInterval(interval);
      if (cb) setTimeout(cb, 400);
    }
  }, 60);
}

function clearCell(row, col) {
  const el = document.getElementById(`cell_${row}_${col}`);
  if (el) el.textContent = '';
}

function setCell(row, col, val) {
  const el = document.getElementById(`cell_${row}_${col}`);
  if (el) el.textContent = val;
}

function highlightCell(row, col) {
  document.querySelectorAll('.cell.highlight,.cell.editing').forEach(c => {
    c.classList.remove('highlight', 'editing');
  });
  const el = document.getElementById(`cell_${row}_${col}`);
  if (el) el.classList.add('highlight');
}

function editCell(row, col) {
  document.querySelectorAll('.cell.highlight,.cell.editing').forEach(c => {
    c.classList.remove('highlight', 'editing');
  });
  const el = document.getElementById(`cell_${row}_${col}`);
  if (el) el.classList.add('editing');
}

function setCellRef(ref) {
  cellRef.textContent = ref;
}

function moveCursorTo(row, col, cb) {
  const pos = getCellPos(row, col);
  if (!cells.cursor) cells.cursor = createCursor();
  if (!cells.pointer) cells.pointer = createPointer();
  cells.cursor.style.left = pos.x + 'px';
  cells.cursor.style.top = pos.y + 'px';
  cells.cursor.style.width = pos.w - 4 + 'px';
  cells.cursor.style.height = pos.h - 4 + 'px';
  cells.pointer.style.left = (pos.x - 10) + 'px';
  cells.pointer.style.top = (pos.y - 12) + 'px';
  if (cb) setTimeout(cb, 300);
}

// Start animation
setTimeout(() => {
  // Step 1: Move to E3
  moveCursorTo(2, 4);
  highlightCell(2, 4);
  setCellRef('E3');
  editCell(2, 4);
  typeFormula('=C3+D3*ROUNDUP(B3-1,0)', () => {
    setCell(2, 4, '22');
    document.querySelectorAll('.cell.editing').forEach(c => c.classList.remove('editing'));
    highlightCell(2, 4);
    
    // Step 2: Move to E5
    setTimeout(() => {
      moveCursorTo(4, 4);
      highlightCell(4, 4);
      setCellRef('E5');
      editCell(4, 4);
      typeFormula('=C5+D5*ROUNDUP(B5-1,0)', () => {
        setCell(4, 4, '47');
        document.querySelectorAll('.cell.editing').forEach(c => c.classList.remove('editing'));
        highlightCell(4, 4);
        
        // Step 3: Move to E6
        setTimeout(() => {
          moveCursorTo(5, 4);
          highlightCell(5, 4);
          setCellRef('E6');
          editCell(5, 4);
          typeFormula('=C6+D6*ROUNDUP(B6-1,0)', () => {
            setCell(5, 4, '32');
            document.querySelectorAll('.cell.editing').forEach(c => c.classList.remove('editing'));
            highlightCell(5, 4);
            
            // Step 4: Move to F8 error
            setTimeout(() => {
              moveCursorTo(7, 5);
              highlightCell(7, 5);
              setCellRef('F8');
              const el = document.getElementById('cell_7_5');
              if (el) {
                el.textContent = '❌ 不符';
                el.classList.add('error');
              }
              
              // Step 5: Move to E2
              setTimeout(() => {
                moveCursorTo(1, 4);
                setCellRef('E2');
                editCell(1, 4);
                typeFormula('=C2+D2*ROUNDUP(B2-1,0)', () => {
                  setCell(1, 4, '27');
                });
              }, 1500);
            }, 1200);
          });
        }, 1000);
      });
    }, 1000);
	});
}, 500);

// Show pain tags staggered
const pains = document.querySelectorAll('.pain');
pains.forEach((p, i) => {
  setTimeout(() => p.classList.add('show'), 800 + i * 400);
});
</script>
</div>
</body>
</html>

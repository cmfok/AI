<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>监听 · AI 真垃圾</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:#0d1117;color:#e6edf3}
.app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}
.header{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.header h1{font-size:18px;font-weight:700;flex:1}
.status{font-size:11px;color:#8b949e;display:flex;gap:6px;align-items:center}
.status .dot{width:8px;height:8px;border-radius:50%}.dot-on{background:#f85149;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.dot-off{background:#484f58}
.controls{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.controls button{flex:1;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;touch-action:manipulation}
.btn-listen{background:rgba(255,45,85,.15);color:#ff2d55;border:1px solid rgba(255,45,85,.2)}
.btn-listen.active{background:var(--accent,#ff2d55);color:#fff}
.btn-listen:active{opacity:.8}
.btn-sync{background:rgba(255,255,255,.06);color:#e6edf3}
.btn-sync:active{background:rgba(255,255,255,.12)}
.transcript{flex:1;overflow-y:auto;padding:12px 16px}
.msg{padding:10px 14px;border-radius:10px;margin-bottom:8px;font-size:14px;line-height:1.6}
.msg-user{background:rgba(100,149,237,.1);border:1px solid rgba(100,149,237,.15)}
.msg-system{background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.12)}
.msg-interim{background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.1);color:#8b949e}
.msg .t{font-size:11px;color:#6e7681;margin-bottom:2px}
.msg .tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;margin-top:4px;background:rgba(255,255,255,.06)}
.hint{text-align:center;padding:40px 20px;color:#484f58;font-size:14px;line-height:1.8}
.hint .big{font-size:48px;margin-bottom:12px}
.footer{padding:8px 16px;border-top:1px solid rgba(255,255,255,.06);display:flex;gap:8px;font-size:11px;color:#484f58}
.footer a{color:#8b949e;text-decoration:none}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🎤 监听</h1>
    <div class="status"><span class="dot dot-off" id="rec-dot"></span><span id="rec-label">未监听</span></div>
  </div>

  <div class="controls">
    <button class="btn-listen" id="btn-listen" onclick="toggleListen()">⏺ 开始监听</button>
    <button class="btn-sync" onclick="sendSync()">🔄 同步翻页</button>
  </div>

  <div class="transcript" id="transcript">
    <div class="hint">
      <div class="big">🎤</div>
      <p>点击「开始监听」后，<br>对着麦克风说出你的问题</p>
      <p style="margin-top:12px;font-size:12px;color:#6e7681">支持语音转文字 + AI语义匹配跳转</p>
    </div>
  </div>

  <div class="footer">
    <a href="index.html" target="_blank">📺 主屏幕</a>
    <span>·</span>
    <a href="control.html">🎮 控制台</a>
    <span>·</span>
    <a href="qa.html">💬 提问</a>
  </div>
</div>

<script>
let isListening = false;
let recognition = null;
let bc = null;
let finalTranscript = '';

/* BroadcastChannel连接 */
try{
  bc = new BroadcastChannel('ppt-ctrl');
}catch(e){bc=null}

/* 发送同步指令 */
function sendSync(){
  try{bc&&bc.postMessage({type:'sync',idx:0})}catch(e){}
  addMessage('system','已发送同步请求','');
}

/* 添加消息到界面 */
function addMessage(type, text, extra){
  const el = document.getElementById('transcript');
  const isInterim = type === 'interim';
  const existing = isInterim ? el.querySelector('.msg-interim:last-child') : null;
  
  if(isInterim && existing){
    existing.innerHTML = `<div class="t">🔊 正在听...</div>${escapeHtml(text)}`;
    return;
  }
  
  // 移除占位提示
  const hint = el.querySelector('.hint');
  if(hint) hint.remove();
  
  const div = document.createElement('div');
  div.className = 'msg msg-' + type;
  const label = type === 'user' ? '🎙 你说' : type === 'system' ? '🤖 系统' : '🔊 识别中';
  div.innerHTML = `<div class="t">${label}</div>${escapeHtml(text)}${extra || ''}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function escapeHtml(str){
  const d=document.createElement('div');d.textContent=str;return d.innerHTML;
}

/* 跳转到匹配的页面 */
function navigateToPage(keywords){
  // 关键词→页码映射
  const map = [
    {kw:['模型','deepseek','gpt','claude','kimi','豆包','千问','gemini','llm'],page:4},
    {kw:['提示词','prompt','提问','问AI','角色','要求','参考'],page:7},
    {kw:['上下文','知识库','资料','文档','pdf','word','excel'],page:8,sub:'ctx'},
    {kw:['青铜','白银','黄金','md','obsidian','知识管理'],page:9},
    {kw:['简历','招聘','面试','hr','人事'],page:10},
    {kw:['对账','运费','财务','账单','excel'],page:11},
    {kw:['规训','缰绳','工具','约束','校验','脚本','工作流'],page:12},
    {kw:['生日','营销','400万','客户'],page:14},
    {kw:['循环','迭代','做查修','复循环','loop'],page:16},
    {kw:['个人','企业','对比','容错'],page:17},
    {kw:['隐私','数据安全','api','私有化'],page:18},
    {kw:['checklist','落地','工具包','api key'],page:19},
    {kw:['猜字','外星人','箭头'],page:2},
    {kw:['四大工程','总览','工程'],page:6}
  ];
  
  const text = keywords.toLowerCase();
  for(const item of map){
    if(item.kw.some(k => text.includes(k))){
      // 跳转页面
      try{bc&&bc.postMessage({type:'goto',idx:item.page-1})}catch(e){}
      addMessage('system',`🔍 检测到关键词「${item.kw.find(k=>text.includes(k))}」→ 跳转到第 ${item.page} 页`,'');
      return item.page;
    }
  }
  return null;
}

/* 切换监听状态 */
function toggleListen(){
  const btn = document.getElementById('btn-listen');
  const dot = document.getElementById('rec-dot');
  const label = document.getElementById('rec-label');
  
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
    addMessage('system','⚠ 您的浏览器不支持语音识别。请使用 Chrome 或 Edge。','');
    return;
  }
  
  if(isListening){
    if(recognition) recognition.stop();
    isListening = false;
    btn.textContent = '⏺ 开始监听';
    btn.classList.remove('active');
    dot.className = 'dot dot-off';
    label.textContent = '未监听';
    return;
  }
  
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.continuous = true;
  recognition.interimResults = true;
  
  recognition.onstart = () => {
    isListening = true;
    btn.textContent = '⏹ 停止监听';
    btn.classList.add('active');
    dot.className = 'dot dot-on';
    label.textContent = '监听中...';
    addMessage('system','🎤 监听已启动，请说话...','');
  };
  
  recognition.onresult = (event) => {
    let interim = '';
    let final = '';
    for(let i = event.resultIndex; i < event.results.length; i++){
      const transcript = event.results[i][0].transcript;
      if(event.results[i].isFinal){
        final += transcript;
        finalTranscript += transcript;
      } else {
        interim += transcript;
      }
    }
    
    if(final){
      addMessage('user', final, '');
      navigateToPage(final);
    }
    if(interim){
      addMessage('interim', interim, '');
    }
  };
  
  recognition.onerror = (event) => {
    console.error('Speech recognition error', event.error);
    addMessage('system',`⚠ 识别错误：${event.error}`,'');
    if(event.error === 'not-allowed'){
      addMessage('system','请允许使用麦克风权限（浏览器地址栏左侧可设置）','');
    }
  };
  
  recognition.onend = () => {
    if(isListening){
      // 自动重启识别
      try{recognition.start()}catch(e){}
    } else {
      addMessage('system','⏹ 监听已停止','');
    }
  };
  
  try{
    recognition.start();
  }catch(e){
    addMessage('system',`⚠ 启动识别失败：${e.message}`,'');
  }
}

/* 初始化提示 */
console.log('🎤 监听页已就绪');
</script>
</body>
</html>
